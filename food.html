<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Orders</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:system-ui;
  padding:20px;
}

h1{
  margin-bottom:20px;
}

.order{
  background:#1e1e1e;
  border:1px solid #333;
  border-radius:10px;
  padding:16px;
  margin-bottom:14px;
}

.item{
  font-size:22px;
  font-weight:800;
  margin-bottom:8px;
}

.details{
  color:#aaa;
  margin-bottom:12px;
}

button{
  background:#20bf6b;
  border:none;
  color:white;
  padding:10px 16px;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
}

.empty{
  color:#666;
  text-align:center;
  margin-top:40px;
}
</style>
</head>
<body>

<h1>FOOD ORDERS</h1>

<div id="orders"></div>

<script>

const SUPABASE_URL = "https://mocujtfoyruievyjmjhe.supabase.co";

const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vY3VqdGZveXJ1aWV2eWptamhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MDg0MTksImV4cCI6MjA5NTM4NDQxOX0.3WRjeNo0zabDGLrEMrxavM5rnz9evMvC8b-8YVu8X5g";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

async function loadOrders() {

  const { data, error } = await supabaseClient
    .from("cafe_orders")
    .select("*")
    .eq("category", "food")
    .eq("status", "new")
    .order("created_at", { ascending: true });

  const container = document.getElementById("orders");

  container.innerHTML = "";

  if (!data || data.length === 0) {
    container.innerHTML =
      "<div class='empty'>No food orders</div>";
    return;
  }

  data.forEach(order => {

    const div = document.createElement("div");

    div.className = "order";

    div.innerHTML = `
      <div class="item">${order.item}</div>
      <div class="details">${order.details}</div>
      <button onclick="completeOrder('${order.id}')">
        COMPLETE
      </button>
    `;

    container.appendChild(div);

  });

}

async function completeOrder(id) {

  await supabaseClient
    .from("cafe_orders")
    .update({ status: "done" })
    .eq("id", id);

  loadOrders();

}

loadOrders();

setInterval(loadOrders, 3000);

</script>

</body>
</html>
