<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen — FOOD</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a1a;
    color: #f0f0f0;
    font-family: Arial, sans-serif;
    min-height: 100vh;
  }

  /* ── TOP BAR ── */
  .topbar {
    background: #111;
    border-bottom: 4px solid #e8a020;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 20px; }
  .screen-title {
    font-size: 26px;
    font-weight: 900;
    color: #e8a020;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .order-pill {
    background: #e8a020;
    color: #000;
    font-size: 15px;
    font-weight: 900;
    padding: 5px 16px;
    border-radius: 20px;
    letter-spacing: 1px;
  }
  .topbar-right { display: flex; align-items: center; gap: 20px; }
  .clock {
    font-size: 22px;
    font-weight: 700;
    color: #ccc;
    font-variant-numeric: tabular-nums;
  }
  .live-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #2dce6c;
    box-shadow: 0 0 8px #2dce6c;
    animation: blink 2s infinite;
  }
  .live-dot.dead { background: #e84040; box-shadow: 0 0 8px #e84040; animation: none; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── GRID ── */
  .grid {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
    align-items: start;
  }

  /* ── TICKET ── */
  .ticket {
    background: #242424;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid #333;
    animation: pop 0.25s ease;
  }
  @keyframes pop { from { opacity:0; transform:scale(0.97); } to { opacity:1; transform:scale(1); } }

  /* coloured top stripe */
  .ticket-stripe {
    height: 6px;
    background: #e8a020;
  }
  .ticket-stripe.takeaway { background: #2dce6c; }

  /* ticket header */
  .ticket-head {
    padding: 14px 16px 12px;
    background: #2c2c2c;
    border-bottom: 2px solid #333;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .table-num {
    font-size: 32px;
    font-weight: 900;
    color: #e8a020;
    line-height: 1;
    letter-spacing: 1px;
  }
  .takeaway-name {
    font-size: 22px;
    font-weight: 900;
    color: #2dce6c;
    line-height: 1;
  }
  .takeaway-tag {
    font-size: 11px;
    color: #888;
    letter-spacing: 2px;
    margin-top: 3px;
    text-transform: uppercase;
  }
  .ticket-time-col { text-align: right; }
  .ticket-time { font-size: 13px; color: #999; }
  .age-badge {
    display: inline-block;
    margin-top: 5px;
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .age-fresh { background: rgba(45,206,108,0.15); color: #2dce6c; }
  .age-mid   { background: rgba(232,160,32,0.15); color: #e8a020; }
  .age-old   { background: rgba(232,64,64,0.15);  color: #e84040; animation: urgBlink 1s infinite; }
  @keyframes urgBlink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* items */
  .ticket-items { padding: 8px 0; }

  .item-row {
    padding: 10px 16px;
    border-bottom: 1px solid #2e2e2e;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .item-row:last-child { border-bottom: none; }

  .item-qty {
    font-size: 22px;
    font-weight: 900;
    color: #e8a020;
    min-width: 36px;
    line-height: 1.2;
    flex-shrink: 0;
  }
  .item-detail { flex: 1; }
  .item-name {
    font-size: 17px;
    font-weight: 700;
    color: #f0f0f0;
    line-height: 1.3;
  }
  .item-options {
    font-size: 13px;
    color: #aaa;
    margin-top: 3px;
    line-height: 1.4;
  }
  .item-note {
    margin-top: 5px;
    background: rgba(255,200,50,0.1);
    border-left: 3px solid #ffc832;
    padding: 4px 8px;
    font-size: 13px;
    color: #ffc832;
    border-radius: 0 4px 4px 0;
  }

  /* footer */
  .ticket-foot {
    padding: 10px 16px;
    background: #2c2c2c;
    border-top: 2px solid #333;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .item-total {
    font-size: 12px;
    color: #666;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .done-btn {
    background: #1e4d2e;
    color: #2dce6c;
    border: 2px solid #2dce6c;
    padding: 8px 22px;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 900;
    cursor: pointer;
    letter-spacing: 2px;
    transition: background 0.15s, color 0.15s;
  }
  .done-btn:hover { background: #2dce6c; color: #000; }
  .done-btn:active { transform: scale(0.97); }

  /* empty */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 100px 20px;
    color: #444;
  }
  .empty-icon { font-size: 80px; margin-bottom: 20px; }
  .empty-msg { font-size: 22px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; }

  /* status footer */
  .statusbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #111;
    border-top: 1px solid #2a2a2a;
    padding: 7px 24px;
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #555;
    letter-spacing: 1px;
  }
  .s-ok  { color: #2dce6c; }
  .s-err { color: #e84040; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="screen-title">🍳 Kitchen — Food</div>
    <div class="order-pill" id="order-pill" style="display:none">0 orders</div>
  </div>
  <div class="topbar-right">
    <div class="clock" id="clock">00:00:00</div>
    <div class="live-dot" id="live-dot"></div>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="statusbar">
  <span id="status-msg">Connecting…</span>
  <span id="last-fetch">–</span>
</div>

<script>
const URL  = "https://mocujtfoyruievyjmjhe.supabase.co";
const KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vY3VqdGZveXJ1aWV2eWptamhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MDg0MTksImV4cCI6MjA5NTM4NDQxOX0.3WRjeNo0zabDGLrEMrxavM5rnz9evMvC8b-8YVu8X5g";
const sb   = supabase.createClient(URL, KEY);

/* ── helpers ── */
function fmt(iso){ return new Date(iso).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}); }
function ago(iso){
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if(s < 60)  return s + "s ago";
  if(s < 3600) return Math.floor(s/60) + "m ago";
  return Math.floor(s/3600) + "h ago";
}
function ageClass(iso){
  const m = Math.floor((Date.now() - new Date(iso)) / 60000);
  return m < 5 ? "age-fresh" : m < 12 ? "age-mid" : "age-old";
}

/* ── group rows → tickets ──
   Sort: tables first (ascending table number),
         takeaways after,
         within each group items stay in arrival order (oldest first). */
function groupAndSort(rows){
  // Group by table_number for table orders, by customer_name for takeaways
  const map = {};
  rows.forEach(r => {
    const key = r.service_type === "table"
      ? "table_" + r.table_number
      : "takeaway_" + (r.customer_name || "unknown");
    if(!map[key]) map[key] = [];
    map[key].push(r);
  });
  // Sort items within each group oldest → newest
  Object.values(map).forEach(g => g.sort((a,b) => new Date(a.created_at) - new Date(b.created_at)));
  // Sort groups: tables first by table number asc, then takeaways by oldest item
  return Object.values(map).sort((a,b) => {
    const aT = a[0].service_type === "table";
    const bT = b[0].service_type === "table";
    if(aT && bT) return a[0].table_number - b[0].table_number;
    if(aT) return -1;
    if(bT) return 1;
    return new Date(a[0].created_at) - new Date(b[0].created_at);
  });
}

/* ── render ── */
let cached = [];

function render(rows){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  if(!rows.length){
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🍽️</div><div class="empty-msg">No food orders</div></div>`;
    document.getElementById("order-pill").style.display = "none";
    return;
  }

  const groups = groupAndSort(rows);
  const pill = document.getElementById("order-pill");
  pill.style.display = "block";
  pill.textContent = groups.length + (groups.length === 1 ? " order" : " orders");

  groups.forEach(group => {
    const first    = group[0];
    const isTable  = first.service_type === "table";
    const oldest   = group[0].created_at;
    const totalQty = group.reduce((s,r) => s + (r.qty || 1), 0);

    const t = document.createElement("div");
    t.className = "ticket";

    // stripe
    const stripe = document.createElement("div");
    stripe.className = "ticket-stripe" + (isTable ? "" : " takeaway");
    t.appendChild(stripe);

    // head
    const head = document.createElement("div");
    head.className = "ticket-head";
    if(isTable){
      head.innerHTML = `
        <div>
          <div class="table-num">TABLE ${first.table_number}</div>
        </div>
        <div class="ticket-time-col">
          <div class="ticket-time">${fmt(oldest)}</div>
          <div class="age-badge ${ageClass(oldest)}">${ago(oldest)}</div>
        </div>`;
    } else {
      head.innerHTML = `
        <div>
          <div class="takeaway-name">🥡 ${(first.customer_name||"UNKNOWN").toUpperCase()}</div>
          <div class="takeaway-tag">Take Away</div>
        </div>
        <div class="ticket-time-col">
          <div class="ticket-time">${fmt(oldest)}</div>
          <div class="age-badge ${ageClass(oldest)}">${ago(oldest)}</div>
        </div>`;
    }
    t.appendChild(head);

    // items
    const itemsWrap = document.createElement("div");
    itemsWrap.className = "ticket-items";
    group.forEach(row => {
      const qty = row.qty || 1;
      const el  = document.createElement("div");
      el.className = "item-row";
      el.innerHTML = `
        <div class="item-qty">${qty}×</div>
        <div class="item-detail">
          <div class="item-name">${row.item}</div>
          ${row.options ? `<div class="item-options">${row.options}</div>` : ""}
          ${row.note    ? `<div class="item-note">⚠ ${row.note}</div>`    : ""}
        </div>`;
      itemsWrap.appendChild(el);
    });
    t.appendChild(itemsWrap);

    // foot
    const foot = document.createElement("div");
    foot.className = "ticket-foot";
    foot.innerHTML = `<div class="item-total">${totalQty} item${totalQty!==1?"s":""}</div>`;
    const btn = document.createElement("button");
    btn.className = "done-btn";
    btn.textContent = "✓  DONE";
    btn.addEventListener("click", () => markDone(group.map(r => r.id)));
    foot.appendChild(btn);
    t.appendChild(foot);

    grid.appendChild(t);
  });
}

async function markDone(ids){
  await sb.from("cafe_orders").update({ status:"done" }).in("id", ids);
  fetchOrders();
}

async function fetchOrders(){
  try {
    const { data, error } = await sb
      .from("cafe_orders")
      .select("*")
      .eq("status","new")
      .eq("category","food")
      .order("created_at", { ascending: true });
    if(error) throw error;
    cached = data || [];
    render(cached);
    document.getElementById("status-msg").textContent = "Live · refreshes every 15s";
    document.getElementById("status-msg").className   = "s-ok";
    document.getElementById("last-fetch").textContent  = "Updated " + new Date().toLocaleTimeString("en-GB");
    document.getElementById("live-dot").classList.remove("dead");
  } catch(e) {
    document.getElementById("status-msg").textContent = "Error: " + e.message;
    document.getElementById("status-msg").className   = "s-err";
    document.getElementById("live-dot").classList.add("dead");
  }
}

// clock
setInterval(() => {
  document.getElementById("clock").textContent = new Date().toLocaleTimeString("en-GB");
}, 1000);

// refresh age badges every 30s without re-fetching
setInterval(() => { if(cached.length) render(cached); }, 30000);

// fetch
fetchOrders();
setInterval(fetchOrders, 15000);

// realtime push
sb.channel("kf").on("postgres_changes",{ event:"*", schema:"public", table:"cafe_orders" },() => fetchOrders()).subscribe();
</script>
</body>
</html>
