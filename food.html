<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen — FOOD</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0f0e0b;--surface:#1a1815;--border:#2e2b24;
    --amber:#f5a623;--amber-dim:rgba(245,166,35,0.12);
    --green:#2dce6c;--green-dim:rgba(45,206,108,0.15);
    --red:#e84040;--text:#f0ece0;--muted:#7a7463;--faint:#3d3a30;
    --ticket-bg:#161410;--ticket-border:#3a3520;
  }
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100dvh;overflow-x:hidden}
  header{position:sticky;top:0;z-index:100;height:64px;background:var(--surface);border-bottom:2px solid var(--amber);display:flex;align-items:center;justify-content:space-between;padding:0 20px;box-shadow:0 4px 32px rgba(245,166,35,0.12)}
  .screen-tag{font-family:'Black Han Sans',sans-serif;font-size:28px;letter-spacing:3px;color:var(--amber);text-shadow:0 0 20px rgba(245,166,35,0.4)}
  .screen-sub{font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;padding-top:2px}
  .header-right{display:flex;align-items:center;gap:16px}
  .pulse-dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
  .pulse-dot.error{background:var(--red);box-shadow:0 0 8px var(--red);animation:none}
  .clock{font-family:'Black Han Sans',sans-serif;font-size:22px;letter-spacing:2px;color:var(--text)}
  .order-count-badge{background:var(--amber);color:#000;font-family:'Black Han Sans',sans-serif;font-size:14px;padding:4px 12px;border-radius:4px;letter-spacing:1px}
  .tickets-grid{padding:20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;align-items:start;padding-bottom:50px}
  .ticket{background:var(--ticket-bg);border:1px solid var(--ticket-border);border-radius:8px;overflow:hidden;animation:slideIn .3s ease;position:relative}
  @keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
  .ticket::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--amber)}
  .ticket-header{padding:12px 14px;background:var(--amber-dim);border-bottom:1px solid var(--ticket-border);display:flex;justify-content:space-between;align-items:flex-start}
  .ticket-header.takeaway-header{background:rgba(45,206,108,.08)}
  .table-label{font-family:'Black Han Sans',sans-serif;font-size:26px;color:var(--amber);letter-spacing:1px;line-height:1}
  .takeaway-label{font-family:'Black Han Sans',sans-serif;font-size:18px;color:var(--green);letter-spacing:1px;line-height:1.2}
  .takeaway-sub{font-size:10px;color:var(--muted);letter-spacing:2px;margin-top:2px}
  .ticket-meta{text-align:right}
  .ticket-time{font-size:11px;color:var(--muted);letter-spacing:1px}
  .ticket-age{font-size:10px;letter-spacing:1px;margin-top:3px;padding:2px 7px;border-radius:3px;display:inline-block}
  .age-fresh{background:var(--green-dim);color:var(--green)}
  .age-mid{background:rgba(245,166,35,.15);color:var(--amber)}
  .age-urgent{background:rgba(232,64,64,.15);color:var(--red);animation:urgentBlink 1s infinite}
  @keyframes urgentBlink{0%,100%{opacity:1}50%{opacity:.5}}
  .ticket-body{}
  .item-row{display:flex;align-items:baseline;gap:8px;padding:6px 14px;border-bottom:1px dashed var(--faint)}
  .item-row:last-child{border-bottom:none}
  .item-qty{font-family:'Black Han Sans',sans-serif;font-size:17px;color:var(--amber);min-width:32px;flex-shrink:0}
  .item-name{font-size:13px;color:var(--text);flex:1;line-height:1.4}
  .item-opts{font-size:11px;color:var(--muted);display:block;margin-top:2px}
  .item-note{font-size:11px;color:#f5c842;display:block;margin-top:3px;padding:3px 7px;background:rgba(245,200,66,.08);border-left:2px solid #f5c842;border-radius:2px}
  .ticket-footer{padding:10px 14px;border-top:1px solid var(--faint);display:flex;justify-content:space-between;align-items:center}
  .item-count{font-size:11px;color:var(--muted);letter-spacing:1px}
  .done-btn{padding:7px 16px;border-radius:5px;border:none;cursor:pointer;font-family:'Black Han Sans',sans-serif;font-size:13px;letter-spacing:2px;background:var(--green-dim);color:var(--green);border:1px solid rgba(45,206,108,.3);transition:all .15s}
  .done-btn:hover{background:var(--green);color:#000}
  .done-btn:active{transform:scale(.96)}
  .empty-state{grid-column:1/-1;text-align:center;padding:80px 20px}
  .empty-icon{font-size:64px;margin-bottom:16px;opacity:.3}
  .empty-text{font-family:'Black Han Sans',sans-serif;font-size:20px;letter-spacing:3px;color:var(--faint)}
  .status-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:8px 20px;display:flex;justify-content:space-between;align-items:center;font-size:10px;letter-spacing:2px;color:var(--muted)}
  .status-ok{color:var(--green)}
  .status-err{color:var(--red)}
</style>
</head>
<body>
<header>
  <div>
    <div class="screen-tag">🍳 KITCHEN</div>
    <div class="screen-sub">Food · Soups · Salads · Sandwiches</div>
  </div>
  <div class="header-right">
    <div id="order-count-badge" class="order-count-badge" style="display:none"></div>
    <div class="clock" id="clock">--:--</div>
    <div class="pulse-dot" id="pulse-dot"></div>
  </div>
</header>
<div class="tickets-grid" id="tickets-grid">
  <div class="empty-state"><div class="empty-icon">🍽️</div><div class="empty-text">NO ACTIVE FOOD ORDERS</div></div>
</div>
<div class="status-bar">
  <span id="status-text">Connecting…</span>
  <span id="last-refresh">–</span>
</div>
<script>
const SUPABASE_URL="https://mocujtfoyruievyjmjhe.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vY3VqdGZveXJ1aWV2eWptamhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MDg0MTksImV4cCI6MjA5NTM4NDQxOX0.3WRjeNo0zabDGLrEMrxavM5rnz9evMvC8b-8YVu8X5g";
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

function isFood(row){return row.category==="food";}

function timeAgo(iso){
  const d=Math.floor((Date.now()-new Date(iso))/1000);
  if(d<60)return d+"s ago";
  if(d<3600)return Math.floor(d/60)+"m ago";
  return Math.floor(d/3600)+"h ago";
}
function ageClass(iso){
  const m=Math.floor((Date.now()-new Date(iso))/60000);
  return m<5?"age-fresh":m<12?"age-mid":"age-urgent";
}
function fmtTime(iso){return new Date(iso).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});}

// Group rows by order_group, then sort groups:
// Table orders sorted by table_number asc, then by oldest created_at within group.
// Takeaway orders after tables, sorted by oldest created_at.
function groupAndSort(rows){
  const map={};
  rows.forEach(r=>{
    if(!map[r.order_group])map[r.order_group]=[];
    map[r.order_group].push(r);
  });
  // Sort rows within each group oldest first
  Object.values(map).forEach(g=>g.sort((a,b)=>new Date(a.created_at)-new Date(b.created_at)));
  return Object.values(map).sort((a,b)=>{
    const aT=a[0].service_type==="table";
    const bT=b[0].service_type==="table";
    if(aT&&bT){
      // Same table? sort by oldest item time
      if(a[0].table_number!==b[0].table_number)return a[0].table_number-b[0].table_number;
      return new Date(a[0].created_at)-new Date(b[0].created_at);
    }
    if(aT)return -1;
    if(bT)return 1;
    return new Date(a[0].created_at)-new Date(b[0].created_at);
  });
}

let allOrders=[];

function renderTickets(rows){
  const grid=document.getElementById("tickets-grid");
  grid.innerHTML="";
  if(!rows.length){
    grid.innerHTML=`<div class="empty-state"><div class="empty-icon">🍽️</div><div class="empty-text">NO ACTIVE FOOD ORDERS</div></div>`;
    document.getElementById("order-count-badge").style.display="none";
    return;
  }
  const groups=groupAndSort(rows);
  const badge=document.getElementById("order-count-badge");
  badge.style.display="block";
  badge.textContent=groups.length+(groups.length===1?" ORDER":" ORDERS");

  groups.forEach(group=>{
    const first=group[0];
    const isTable=first.service_type==="table";
    const oldestTime=group[0].created_at; // already sorted oldest first
    const totalQty=group.reduce((s,r)=>s+(r.qty||1),0);

    const ticket=document.createElement("div");
    ticket.className="ticket";

    const hdr=document.createElement("div");
    hdr.className="ticket-header"+(isTable?"":" takeaway-header");
    hdr.innerHTML=isTable
      ?`<div><div class="table-label">TABLE ${first.table_number}</div></div>
         <div class="ticket-meta"><div class="ticket-time">${fmtTime(oldestTime)}</div><div class="ticket-age ${ageClass(oldestTime)}">${timeAgo(oldestTime)}</div></div>`
      :`<div><div class="takeaway-label">🥡 ${(first.customer_name||"UNKNOWN").toUpperCase()}</div><div class="takeaway-sub">TAKE AWAY</div></div>
         <div class="ticket-meta"><div class="ticket-time">${fmtTime(oldestTime)}</div><div class="ticket-age ${ageClass(oldestTime)}">${timeAgo(oldestTime)}</div></div>`;
    ticket.appendChild(hdr);

    const body=document.createElement("div");
    body.className="ticket-body";
    group.forEach(row=>{
      const qty=row.qty||1;
      const el=document.createElement("div");
      el.className="item-row";
      const optsHtml=row.options?`<span class="item-opts">${row.options}</span>`:"";
      const noteHtml=row.note?`<span class="item-note">⚠ ${row.note}</span>`:"";
      el.innerHTML=`<div class="item-qty">${qty}×</div><div class="item-name">${row.item}${optsHtml}${noteHtml}</div>`;
      body.appendChild(el);
    });
    ticket.appendChild(body);

    const footer=document.createElement("div");
    footer.className="ticket-footer";
    footer.innerHTML=`<span class="item-count">${totalQty} ITEM${totalQty!==1?"S":""}</span>`;
    const doneBtn=document.createElement("button");
    doneBtn.className="done-btn";
    doneBtn.textContent="✓ DONE";
    doneBtn.addEventListener("click",()=>markDone(group.map(r=>r.id)));
    footer.appendChild(doneBtn);
    ticket.appendChild(footer);
    grid.appendChild(ticket);
  });
}

async function markDone(ids){
  await sb.from("cafe_orders").update({status:"done"}).in("id",ids);
  fetchOrders();
}

async function fetchOrders(){
  try{
    const{data,error}=await sb.from("cafe_orders").select("*").eq("status","new").order("created_at",{ascending:true});
    if(error)throw error;
    allOrders=(data||[]).filter(isFood);
    renderTickets(allOrders);
    document.getElementById("status-text").textContent="LIVE · AUTO-REFRESH 15s";
    document.getElementById("status-text").className="status-ok";
    document.getElementById("last-refresh").textContent="Last: "+new Date().toLocaleTimeString("en-GB");
    document.getElementById("pulse-dot").classList.remove("error");
  }catch(e){
    document.getElementById("status-text").textContent="ERROR: "+e.message;
    document.getElementById("status-text").className="status-err";
    document.getElementById("pulse-dot").classList.add("error");
  }
}

function updateClock(){document.getElementById("clock").textContent=new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit"});}
setInterval(updateClock,1000);updateClock();
setInterval(()=>{if(allOrders.length)renderTickets(allOrders);},30000);
fetchOrders();
setInterval(fetchOrders,15000);
sb.channel("food-screen").on("postgres_changes",{event:"*",schema:"public",table:"cafe_orders"},()=>fetchOrders()).subscribe();
</script>
</body>
</html>
