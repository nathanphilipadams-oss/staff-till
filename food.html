<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kitchen Display</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111;
    color: #fff;
    font-family: system-ui, sans-serif;
    min-height: 100vh;
    padding: 14px;
  }

  /* ── TOP BAR ── */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    gap: 10px;
    flex-wrap: wrap;
  }
  .top-bar h1 {
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 3px;
    color: #ffcc00;
  }
  .top-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .live-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: #20bf6b;
    animation: pulse 2s infinite;
  }
  .live-dot.stale { background: #cc4444; animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .live-lbl { font-size: 11px; font-weight: 700; color: #555; letter-spacing: 1px; }

  .btn-sm {
    background: #1e1e1e;
    border: 1px solid #2e2e2e;
    color: #888;
    padding: 7px 13px;
    border-radius: 7px;
    font-weight: 700;
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 1px;
  }
  .btn-sm:active { background: #2a2a2a; }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 12px;
  }

  /* ── ORDER CARD ── */
  .card {
    background: #1a1a1a;
    border: 2px solid #2a2a2a;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .card.urgent { border-color: #cc3333; animation: urg 1.2s infinite; }
  .card.takeaway { border-color: #3a6fff; }
  @keyframes urg { 0%,100%{border-color:#cc3333} 50%{border-color:#ff5555} }

  /* Card header */
  .card-head {
    padding: 11px 14px;
    background: #202020;
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card-head.tw { background: #151e35; }

  .tbl-lbl { font-size: 28px; font-weight: 900; color: #ffcc00; }
  .tw-lbl  { font-size: 20px; font-weight: 900; color: #5588ff; }

  .card-meta { text-align: right; }
  .card-age { font-size: 12px; font-weight: 700; color: #555; }
  .card-age.w { color: #e67e22; }
  .card-age.l { color: #cc3333; }
  .card-cnt { font-size: 11px; color: #444; margin-top: 2px; }

  /* Card body */
  .card-body {
    flex: 1;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 9px;
  }

  .row {
    border-bottom: 1px solid #222;
    padding-bottom: 9px;
  }
  .row:last-child { border-bottom: none; padding-bottom: 0; }

  .row-name {
    font-size: 19px;
    font-weight: 900;
    line-height: 1.2;
    margin-bottom: 5px;
  }
  .row-qty { color: #ffcc00; margin-right: 3px; }

  .tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag {
    background: #242424;
    border: 1px solid #303030;
    border-radius: 5px;
    padding: 4px 10px;
    font-size: 15px;
    font-weight: 700;
    color: #ccc;
  }
  .tag.hi { background: #1e1a08; border-color: #ffcc00; color: #ffcc00; }   /* note */
  .tag.add { background: #0d1e10; border-color: #20bf6b; color: #20bf6b; } /* additions */

  /* Card footer */
  .card-foot {
    padding: 9px 12px;
    background: #161616;
    border-top: 1px solid #222;
  }
  .btn-done {
    width: 100%;
    padding: 12px 0;
    background: #20bf6b;
    border: none;
    color: #fff;
    border-radius: 8px;
    font-weight: 800;
    font-size: 15px;
    cursor: pointer;
    letter-spacing: 1px;
  }
  .btn-done:active { opacity: 0.75; }

  /* ── EMPTY ── */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    color: #333;
    font-size: 18px;
    font-weight: 700;
    padding: 60px 0;
    letter-spacing: 1px;
  }

  /* ── HISTORY ── */
  .hist-section {
    margin-top: 28px;
    border-top: 1px solid #1e1e1e;
    padding-top: 18px;
  }
  .hist-title {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 2px;
    color: #333;
    margin-bottom: 12px;
  }
  .hist-row {
    background: #141414;
    border: 1px solid #1e1e1e;
    border-radius: 8px;
    padding: 9px 13px;
    margin-bottom: 7px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .hist-lbl { font-size: 13px; font-weight: 800; color: #555; }
  .hist-items { font-size: 12px; color: #333; margin-top: 2px; }
  .btn-undo {
    background: #1a1a1a;
    border: 1px solid #252525;
    color: #555;
    padding: 5px 11px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-undo:active { color: #fff; }
</style>
</head>
<body>

<div class="top-bar">
  <h1>&#127859; KITCHEN</h1>
  <div class="top-right">
    <div class="live-dot" id="ldot"></div>
    <span class="live-lbl" id="llbl">LIVE</span>
    <button class="btn-sm" onclick="toggleHist()">SHOW COMPLETED</button>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="hist-section" id="hist-section" style="display:none;">
  <div class="hist-title">COMPLETED</div>
  <div id="hist-body"></div>
</div>

<script>
const BASE = "https://mocujtfoyruievyjmjhe.supabase.co/rest/v1/cafe_orders";
const KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vY3VqdGZveXJ1aWV2eWptamhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MDg0MTksImV4cCI6MjA5NTM4NDQxOX0.3WRjeNo0zabDGLrEMrxavM5rnz9evMvC8b-8YVu8X5g";
const H    = { "apikey": KEY, "Authorization": "Bearer " + KEY, "Content-Type": "application/json" };

let lastOk     = Date.now();
let knownKeys  = new Set();
let firstLoad  = true;
let audioCtx   = null;

/* ── helpers ─────────────────────────────────────────── */
function age(ts) {
  const m = Math.floor((Date.now() - new Date(ts)) / 60000);
  if (m < 1)  return { text: "just now", cls: "" };
  if (m < 5)  return { text: m + "m",    cls: "" };
  if (m < 10) return { text: m + "m",    cls: "w" };
  return               { text: m + "m",  cls: "l" };
}

function ping() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = 880;
    g.gain.setValueAtTime(0.3, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
    o.start(); o.stop(audioCtx.currentTime + 0.4);
  } catch(e) {}
}

/* ── build tag list from proper columns ──────────────── */
function buildTags(row) {
  const SUPPRESS_MILK = ["normal milk", ""];
  const tags = [], additions = [];

  // Options shown as plain tags
  if (row.size)              tags.push(row.size);
  if (row.bread)             tags.push(row.bread);
  if (row.sauce && row.sauce.toLowerCase() !== "no sauce") tags.push(row.sauce);
  if (row.milk  && !SUPPRESS_MILK.includes(row.milk.toLowerCase())) tags.push(row.milk);
  if (row.garnish)           tags.push(row.garnish);
  if (row.coffee_type)       tags.push(row.coffee_type);
  if (row.tea_serve)         tags.push(row.tea_serve);
  if (row.fruit_tea_flavour) tags.push(row.fruit_tea_flavour);
  if (row.water_type)        tags.push(row.water_type);
  if (row.wine_size)         tags.push(row.wine_size);
  if (row.hot_choc_type)     tags.push(row.hot_choc_type);
  if (row.cone)              tags.push(row.cone);
  if (row.flake && row.flake.toLowerCase() !== "no flake") tags.push(row.flake);
  if (row.flavour)           tags.push(row.flavour);

  // Additions shown in green
  if (row.extra_shot)  additions.push("+ Extra Shot");
  if (row.syrup)       additions.push("+ Syrup");
  if (row.preserves)   additions.push("+ Preserves");

  // Fallback: if new columns don't exist yet, parse details string
  if (!row.size && !row.bread && !row.milk && !row.coffee_type && !row.tea_serve && row.details) {
    const SKIP = ["normal milk","milk: normal milk","no extra shot","no syrup","no preserves","no sauce","no flake"];
    row.details.split(" | ").forEach(p => {
      const low = p.toLowerCase().trim();
      if (low.startsWith("qty:") || low.startsWith("price:") || low.startsWith("note:")) return;
      if (SKIP.includes(low)) return;
      const cleaned = p.replace(/^(size|bread|sauce|milk|garnish|serve|coffee|tea|water|cone|flake|flavour|fruit tea|extra shot|syrup|preserves):\s*/i, "").trim();
      if (cleaned) tags.push(cleaned);
    });
  }

  return { tags, additions };
}

function getNote(row) {
  if (row.note) return row.note;
  // fallback from details string
  if (row.details) {
    const m = row.details.match(/NOTE:\s*(.+?)(\s*\|.*)?$/i);
    if (m) return m[1].trim();
  }
  return null;
}

function getQty(row) {
  if (row.qty && row.qty > 1) return row.qty;
  if (row.details) {
    const m = row.details.match(/Qty:\s*(\d+)/i);
    if (m) return parseInt(m[1]);
  }
  return 1;
}

/* ── build a card DOM element ────────────────────────── */
function buildCard(groupKey, rows) {
  const first  = rows[0];
  const isTable = !!first.table_number;
  const label  = isTable ? "TABLE " + first.table_number : (first.customer_name || "TAKEAWAY");
  const a      = age(first.created_at);
  const mins   = Math.floor((Date.now() - new Date(first.created_at)) / 60000);

  const card = document.createElement("div");
  card.className = "card" + (mins >= 10 ? " urgent" : "") + (!isTable ? " takeaway" : "");

  // Header
  const head = document.createElement("div");
  head.className = "card-head" + (!isTable ? " tw" : "");
  head.innerHTML = `
    <div class="${isTable ? "tbl-lbl" : "tw-lbl"}">${label}</div>
    <div class="card-meta">
      <div class="card-age ${a.cls}">${a.text}</div>
      <div class="card-cnt">${rows.length} item${rows.length !== 1 ? "s" : ""}</div>
    </div>`;
  card.appendChild(head);

  // Body
  const body = document.createElement("div");
  body.className = "card-body";

  rows.forEach(row => {
    const qty  = getQty(row);
    const note = getNote(row);
    const { tags, additions } = buildTags(row);

    const rowEl = document.createElement("div");
    rowEl.className = "row";

    let tagsHTML = tags.map(t => `<span class="tag">${t}</span>`).join("");
    tagsHTML    += additions.map(t => `<span class="tag add">${t}</span>`).join("");
    if (note)    tagsHTML += `<span class="tag hi">&#128221; ${note}</span>`;

    rowEl.innerHTML = `
      <div class="row-name">
        ${qty > 1 ? `<span class="row-qty">${qty}x</span>` : ""}${row.item}
      </div>
      ${tagsHTML ? `<div class="tags">${tagsHTML}</div>` : ""}`;
    body.appendChild(rowEl);
  });
  card.appendChild(body);

  // Footer
  const foot = document.createElement("div");
  foot.className = "card-foot";
  const btn = document.createElement("button");
  btn.className = "btn-done";
  btn.textContent = "DONE";
  btn.onclick = () => markDone(null, rows.map(r => r.id));
  foot.appendChild(btn);
  card.appendChild(foot);

  return card;
}

/* ── main load ───────────────────────────────────────── */
async function load() {
  try {
    const res = await fetch(BASE + "?category=eq.food&order=created_at.asc&select=*", { headers: H });
    if (!res.ok) throw new Error(res.status + " " + await res.text());
    const data = await res.json();

    lastOk = Date.now();
    setLive(true);

    const active    = data.filter(r => !r.status || r.status === "new");
    const completed = data.filter(r => r.status === "done");

    // Ping on new
    const incoming = new Set(active.map(r => r.order_group || r.id));
    let hasNew = false;
    incoming.forEach(k => { if (!knownKeys.has(k)) hasNew = true; });
    if (hasNew && !firstLoad) ping();
    knownKeys = incoming;
    firstLoad = false;

    // Group by table_number (or customer_name for takeaways), sorted numerically
    const grouped = {};
    active.forEach(r => {
      const k = r.table_number != null ? ("t_" + r.table_number) : ("tw_" + (r.customer_name || "takeaway"));
      if (!grouped[k]) grouped[k] = [];
      grouped[k].push(r);
    });

    const sorted = Object.entries(grouped).sort(([, a], [, b]) => {
      const tA = a[0].table_number ?? 9999;
      const tB = b[0].table_number ?? 9999;
      return tA - tB;
    });

    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    if (!sorted.length) {
      grid.innerHTML = "<div class='empty'>&#10003; All clear</div>";
    } else {
      sorted.forEach(([key, rows]) => grid.appendChild(buildCard(key, rows)));
    }

    // History
    const histBody = document.getElementById("hist-body");
    histBody.innerHTML = "";
    const compGrouped = {};
    completed.forEach(r => {
      const k = r.table_number != null ? ("t_" + r.table_number) : ("tw_" + (r.customer_name || "takeaway"));
      if (!compGrouped[k]) compGrouped[k] = [];
      compGrouped[k].push(r);
    });

    const compSorted = Object.entries(compGrouped)
      .sort(([, a], [, b]) => new Date(b[0].created_at) - new Date(a[0].created_at))
      .slice(0, 15);

    if (!compSorted.length) {
      histBody.innerHTML = "<div style='color:#333;font-size:12px;'>Nothing completed yet</div>";
    } else {
      compSorted.forEach(([, rows]) => {
        const f = rows[0];
        const lbl = f.table_number ? "Table " + f.table_number : (f.customer_name || "Takeaway");
        const div = document.createElement("div");
        div.className = "hist-row";
        div.innerHTML = `
          <div>
            <div class="hist-lbl">&#10003; ${lbl}</div>
            <div class="hist-items">${rows.map(r => r.item).join(", ")}</div>
          </div>
          <button class="btn-undo" onclick="markNew(null, ${JSON.stringify(rows.map(r=>r.id))})">UNDO</button>`;
        histBody.appendChild(div);
      });
    }

  } catch(e) {
    setLive(false);
    console.error(e);
    document.getElementById("grid").innerHTML =
      `<div class='empty' style='color:#cc3333;font-size:13px;'>ERROR: ${e.message}</div>`;
  }
}

/* ── mark done / undo ────────────────────────────────── */
async function markDone(group, ids) {
  await patch(group, ids, "done");
}
async function markNew(group, ids) {
  await patch(group, ids, "new");
}
async function patch(group, ids, status) {
  try {
    const patchHeaders = Object.assign({}, H, { "Prefer": "return=representation" });
    let allOk = true;

    for (const id of ids) {
      const url = BASE + "?id=eq." + id;
      console.log("PATCHING:", url, "status ->", status);
      const res = await fetch(url, {
        method: "PATCH",
        headers: patchHeaders,
        body: JSON.stringify({ status: status })
      });
      const text = await res.text();
      console.log("PATCH result:", res.status, text);
      if (!res.ok) {
        allOk = false;
        alert("Supabase error " + res.status + ": " + text);
        return;
      }
    }

    if (allOk) load();
  } catch(e) {
    console.error("patch crash:", e);
    alert("Error: " + e.message);
  }
}

/* ── live indicator ──────────────────────────────────── */
function setLive(ok) {
  document.getElementById("ldot").className = "live-dot" + (ok ? "" : " stale");
  document.getElementById("llbl").textContent = ok ? "LIVE" : "RECONNECTING...";
}

/* ── history toggle ──────────────────────────────────── */
function toggleHist() {
  const s = document.getElementById("hist-section");
  const b = document.querySelector(".btn-sm");
  const hidden = s.style.display === "none";
  s.style.display = hidden ? "block" : "none";
  b.textContent = hidden ? "HIDE COMPLETED" : "SHOW COMPLETED";
}

/* ── stale check ─────────────────────────────────────── */
setInterval(() => { if (Date.now() - lastOk > 15000) setLive(false); }, 10000);

/* ── age refresh every 30s ───────────────────────────── */
setInterval(load, 30000);

/* ── poll every 5s ───────────────────────────────────── */
setInterval(load, 5000);

load();
</script>
</body>
</html>
