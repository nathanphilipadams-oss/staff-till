<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Orders</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:system-ui;
  padding:20px;
}

h1{
  margin-bottom:20px;
}

.order{
  border-left: 6px solid #ffcc00;
  background:#1e1e1e;
  border:1px solid #333;
  border-radius:10px;
  padding:16px;
  margin-bottom:14px;
}

.item{
  font-size:22px;
  font-weight:800;
  margin-bottom:8px;
}

.details{
  color:#aaa;
  margin-bottom:12px;
}

button{
  background:#20bf6b;
  border:none;
  color:white;
  padding:10px 16px;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
}

.empty{
  color:#666;
  text-align:center;
  margin-top:40px;
}
</style>
</head>
<body>

<h1>DRINK ORDERS</h1>
<button id="toggle-history-btn" onclick="toggleHistory()">
  SHOW COMPLETED
</button>

<div id="history-section" style="display:none;">
  <h2 style="margin-top:20px;">Completed Orders</h2>
  <div id="completed-orders"></div>
</div>
<div id="orders"></div>

<script>

const SUPABASE_URL = "https://mocujtfoyruievyjmjhe.supabase.co";

const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vY3VqdGZveXJ1aWV2eWptamhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MDg0MTksImV4cCI6MjA5NTM4NDQxOX0.3WRjeNo0zabDGLrEMrxavM5rnz9evMvC8b-8YVu8X5g";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

async function loadOrders() {

const { data, error } = await supabaseClient
  .from("cafe_orders")
  .select("*")
  .eq("category", "drink")
  .order("created_at", { ascending: false });
  
console.log(data);
console.log(error);
  
  const activeContainer =
    document.getElementById("orders");

  const completedContainer =
    document.getElementById("completed-orders");

  activeContainer.innerHTML = "";
  completedContainer.innerHTML = "";

  if (!data || data.length === 0) {

    activeContainer.innerHTML =
      "<div class='empty'>No drink orders</div>";

    return;
  }

   data.forEach(order => {

    const div = document.createElement("div");

    div.className = "order";

    const isDone = order.status === "done";

    if (isDone) {
      div.style.opacity = "0.6";
      div.style.borderLeftColor = "#20bf6b";
    }

    div.innerHTML = `
      <div class="item">${order.item}</div>

      <div class="details">
        ${order.details}
      </div>

      <div style="
        margin-bottom:12px;
        font-weight:700;
        color:${isDone ? "#20bf6b" : "#ffcc00"};
      ">
        ${isDone ? "COMPLETED" : "NEW ORDER"}
      </div>

      ${
        !isDone
        ?
        `<button onclick="completeOrder('${order.id}')">
          COMPLETE
        </button>`
        :
        ""
      }
    `;

    if (isDone) {
      completedContainer.appendChild(div);
    } else {
      activeContainer.appendChild(div);
    }

  });

}
  
/* LOAD ON PAGE OPEN */
loadOrders();

/* LIVE UPDATES */
supabaseClient
  .channel("orders")
  .on(
    "postgres_changes",
    {
      event: "*",
      schema: "public",
      table: "cafe_orders"
    },
    () => {

      loadOrders();

    }
  )
  .subscribe();
async function completeOrder(id) {

  await supabaseClient
    .from("cafe_orders")
    .update({ status: "done" })
    .eq("id", id);

  await trimHistory();

  loadOrders();

}

async function trimHistory() {

  const { data } = await supabaseClient
    .from("cafe_orders")
    .select("*")
    .eq("status", "done")
    .order("created_at", { ascending: false });

  if (!data || data.length <= 5) return;

  const oldOrders = data.slice(5);

  for (const order of oldOrders) {

    await supabaseClient
      .from("cafe_orders")
      .delete()
      .eq("id", order.id);

  }

}

function toggleHistory() {

  const section =
    document.getElementById("history-section");

  const btn =
    document.getElementById("toggle-history-btn");

  if (section.style.display === "none") {

    section.style.display = "block";

    btn.textContent = "HIDE COMPLETED";

  } else {

    section.style.display = "none";

    btn.textContent = "SHOW COMPLETED";

  }

}

loadOrders();

setInterval(loadOrders, 3000);

</script>

</body>
</html>
