<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Till</title>
  <style>
    /* Global Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: #111;
      color: #f0f0f0;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Split View Container */
    .main-viewport {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    .column {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .column:first-child {
      border-right: 1px solid #2e2e2e;
    }

    /* Headers */
    .column-header {
      background: #000;
      padding: 13px 0;
      text-align: center;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 2px;
      color: #3b9eff;
      border-bottom: 3px solid #3b9eff;
      flex-shrink: 0;
    }

    /* Accordion & Scroll Area */
    .scroll-container {
      flex: 1;
      overflow-y: auto;
    }
    .section-btn {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      border: none;
      cursor: pointer;
      background: #1e1e1e;
      border-bottom: 1px solid #2e2e2e;
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 1px;
    }
    .section-btn.open {
      background: #1a3f6a;
    }
    .item-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 5px;
      padding: 6px;
      background: #161616;
      border-bottom: 1px solid #2e2e2e;
      display: none; /* Controlled by JS */
    }

    /* Item Buttons */
    .item-btn {
      padding: 10px 5px;
      background: #1e1e1e;
      border: 1px solid #2e2e2e;
      border-radius: 6px;
      cursor: pointer;
      color: #f0f0f0;
      text-align: center;
      line-height: 1.3;
      font-size: 12px;
    }
    .item-btn .name {
      display: block;
      font-weight: 600;
    }
    .item-btn .price {
      display: block;
      color: #3b9eff;
      font-weight: 700;
      margin-top: 3px;
      font-size: 13px;
    }

    /* Bottom Order Footer */
    .footer-btn {
      flex-shrink: 0;
      padding: 16px 20px;
      border: none;
      cursor: pointer;
      background: #333;
      color: #fff;
      font-weight: 800;
      font-size: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }
    .footer-btn.has-items {
      background: #3b9eff;
    }

    /* Modals Overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      z-index: 98;
      visibility: hidden;
    }
    
    /* Order Sheet Modal (Slides Up) */
    #order-modal {
      align-items: flex-end;
    }
    .order-sheet {
      background: #1e1e1e;
      width: 100%;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      border-radius: 14px 14px 0 0;
    }
    .sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid #2e2e2e;
      flex-shrink: 0;
    }
    .sheet-header .title {
      font-weight: 800;
      font-size: 16px;
    }
    .btn-group {
      display: flex;
      gap: 10px;
    }
    .btn-clear {
      background: #cc3333;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
    }
    .btn-close {
      background: #444;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
    }
    .order-lines {
      overflow-y: auto;
      flex: 1;
      padding: 8px 14px;
    }
    .empty-msg {
      color: #666;
      text-align: center;
      padding: 40px 0;
    }
    .order-line-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #2e2e2e;
    }
    .remove-btn {
      background: none;
      border: none;
      color: #cc3333;
      cursor: pointer;
      font-size: 16px;
      padding: 0;
      flex-shrink: 0;
    }
    .line-label {
      flex: 1;
      font-size: 14px;
      line-height: 1.3;
    }
    .qty-input {
      width: 38px;
      text-align: center;
      background: #2a2a2a;
      border: 1px solid #2e2e2e;
      border-radius: 4px;
      color: #fff;
      padding: 4px 0;
      font-size: 14px;
    }
    .line-total {
      min-width: 52px;
      text-align: right;
      color: #3b9eff;
      font-weight: 700;
      font-size: 14px;
    }
    .sheet-total {
      padding: 14px 16px;
      background: #000;
      border-top: 2px solid #2e2e2e;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-shrink: 0;
    }
    .sheet-total .lbl {
      color: #666;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
    }
    .sheet-total .val {
      font-size: 36px;
      font-weight: 900;
      color: #3b9eff;
    }

    /* Option Picker Modal (Centered) */
    #options-modal {
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 99;
    }
    .options-box {
      background: #1e1e1e;
      border-radius: 10px;
      padding: 20px;
      width: 100%;
      max-width: 320px;
      border: 1px solid #2e2e2e;
    }
    .opt-title {
      font-weight: 800;
      font-size: 15px;
      margin-bottom: 2px;
    }
    .opt-price {
      color: #3b9eff;
      font-weight: 700;
      font-size: 20px;
      margin-bottom: 16px;
    }
    .picker-group {
      margin-bottom: 14px;
    }
    .picker-label {
      font-size: 11px;
      color: #666;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .picker-row {
      display: flex;
      gap: 8px;
    }
    .picker-btn {
      flex: 1;
      padding: 10px 4px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
      background: #333;
      color: #fff;
      line-height: 1.4;
    }
    .picker-btn.selected {
      background: #3b9eff;
    }
    .opt-actions {
      display: flex;
      gap: 8px;
      margin-top: 18px;
    }
    .opt-cancel-btn {
      flex: 1;
      padding: 11px 0;
      background: #333;
      color: #f0f0f0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 700;
    }
    .opt-add-btn {
      flex: 2;
      padding: 11px 0;
      background: #3b9eff;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 800;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <div class="main-viewport">
    <div class="column" id="col-food">
      <div class="column-header">FOOD</div>
      <div class="scroll-container" id="food-sections"></div>
    </div>
    
    <div class="column" id="col-drinks">
      <div class="column-header">DRINKS</div>
      <div class="scroll-container" id="drinks-sections"></div>
    </div>
  </div>

  <button class="footer-btn" id="view-order-btn" onclick="openOrderModal()">
    <span id="item-count-label">VIEW ORDER</span>
    <span id="footer-total-label" style="font-size: 22px; display: none;">£0.00</span>
  </button>

  <div class="modal-overlay" id="order-modal">
    <div class="order-sheet">
      <div class="sheet-header">
        <span class="title">ORDER</span>
        <div class="btn-group">
          <button class="btn-clear" id="clear-btn" onclick="clearOrder()">CLEAR</button>
          <button class="btn-close" onclick="closeOrderModal()">CLOSE</button>
        </div>
      </div>
      <div class="order-lines" id="order-items-box"></div>
      <div class="sheet-total" id="sheet-total-box">
        <span class="lbl">TOTAL</span>
        <span class="val" id="sheet-total-label">£0.00</span>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="options-modal">
    <div class="options-box">
      <div class="opt-title" id="opt-item-name">Item Name</div>
      <div class="opt-price" id="opt-item-price">£0.00</div>
      
      <div id="dynamic-pickers-container"></div>

      <div class="opt-actions">
        <button class="opt-cancel-btn" onclick="closeOptionsModal()">Cancel</button>
        <button class="opt-add-btn" id="opt-submit-btn">Add £0.00</button>
      </div>
    </div>
  </div>

  <script>
    // Configuration Master Menu Data
    const MENU = {
      food: {
        sections: [
          {
            label: "Soups & Salads",
            items: [
              { name: "Soup of the Day", price: 9.50 },
              { name: "Crab Soup", price: 10.75 },
              { name: "Crab Salad", prices: { Small: 21.95, Large: 28.95 }, askSize: true },
              { name: "Caesar Salad", prices: { Small: 14.95, Large: 21.95 }, askSize: true },
              { name: "Cheddar Salad", prices: { Small: 14.95, Large: 20.25 }, askSize: true },
              { name: "Prawn Cocktail", prices: { Small: 21.75, Large: 26.45 }, askSize: true },
              { name: "Shell Prawns", prices: { Small: 17.95, Large: 24.95 }, askSize: true },
              { name: "Side Salad", price: 7.75 },
            ],
          },
          {
            label: "Sandwiches",
            items: [
              { name: "Crab Sandwich", price: 16.95, askBread: true, askGarnish: true },
              { name: "Smoked Salmon", price: 11.75, askBread: true },
              { name: "Prawns", price: 11.75, askBread: true },
              { name: "Tuna Mayo", price: 9.95, askBread: true },
              { name: "Egg Mayo", price: 8.95, askBread: true },
              { name: "Chicken", price: 9.95, askBread: true },
              { name: "Ham", price: 9.95, askBread: true },
              { name: "Cheddar Cheese", price: 8.45, askBread: true },
              { name: "Salad Sandwich", price: 8.45, askBread: true },
            ],
          },
        ],
      },
      drinks: {
        sections: [
          {
            label: "Hot Drinks",
            items: [
              { name: "Americano", price: 3.60 },
              { name: "Cafe Latte", price: 3.80 },
              { name: "Macchiato", price: 3.80 },
              { name: "Cappuccino", price: 3.80 },
              { name: "Espresso", price: 2.50 },
              { name: "Mocha", price: 4.15 },
              { name: "Decaf Coffee", price: 2.40 },
              { name: "Extra Shot", price: 1.25 },
              { name: "Flavoured Syrup", price: 1.00 },
              { name: "Tea - Mug", price: 3.00 },
              { name: "Tea - Pot", price: 4.00 },
              { name: "Earl Grey - Mug", price: 2.95 },
              { name: "Earl Grey - Pot", price: 4.10 },
              { name: "Fruit Tea - Mug", price: 3.00 },
              { name: "Fruit Tea - Pot", price: 4.10 },
              { name: "Bovril", price: 3.20 },
              { name: "Hot Choc", price: 3.95 },
              { name: "Hot Choc + Cream", price: 4.20 },
            ],
          },
          {
            label: "Cold Drinks",
            items: [
              { name: "OJ / Apple Juice", price: 1.70 },
              { name: "Ribena", price: 1.90 },
              { name: "Soft Drink Can", price: 3.00 },
              { name: "Elderflower Presse", price: 3.75 },
              { name: "Raspberry Lemonade", price: 3.75 },
              { name: "Mineral Water", price: 1.90 },
            ],
          },
          {
            label: "Alcohol",
            items: [
              { name: "Carling", price: 5.00 },
              { name: "Estrella", price: 5.25 },
              { name: "Planet Lager", price: 6.50 },
              { name: "Wight Gold Ale", price: 6.50 },
              { name: "Fuggle Dee Dum", price: 6.50 },
              { name: "Cider", price: 6.50 },
            ],
          },
          {
            label: "Cakes & Snacks",
            items: [
              { name: "Carrot Cake", price: 4.10 },
              { name: "Caramel Shortcake", price: 3.65 },
              { name: "Flapjack", price: 2.95 },
              { name: "Rock Cake", price: 2.95 },
              { name: "Choc Brownie", price: 3.65 },
              { name: "Lemon Drizzle", price: 3.25 },
              { name: "Bread Pudding", price: 2.95 },
              { name: "Caramel Nut Slice", price: 3.65 },
              { name: "Cream Tea", price: 7.95 },
              { name: "Crisps", price: 1.80 },
            ],
          },
        ],
      },
    ];

    const BREAD = [
      { label: "White", surcharge: 0 },
      { label: "Brown Seeded", surcharge: 0 },
      { label: "Baguette", surcharge: 1.80 },
    ];
    const GARNISH = ["Crisps", "Salad Garnish"];
    const SIZES = ["Small", "Large"];

    // App State Configuration
    let currentLines = [];
    let modalState = null;

    // Helper Functions
    function lineKey(name, opts) {
      return name + (opts ? JSON.stringify(opts) : "");
    }

    function lineLabel(name, opts) {
      if (!opts) return name;
      const parts = [opts.size, opts.bread, opts.garnish].filter(Boolean);
      return parts.length ? name + " (" + parts.join(", ") + ")" : name;
    }

    function calcPrice(item, opts) {
      const base = item.askSize ? item.prices[opts && opts.size ? opts.size : "Small"] : item.price;
      const breadSurcharge = opts && opts.bread ? (BREAD.find(b => b.label === opts.bread) || {surcharge:0}).surcharge : 0;
      return base + breadSurcharge;
    }

    // Initialize View Elements
    function setupMenu() {
      renderMenuType('food', document.getElementById('food-sections'));
      renderMenuType('drinks', document.getElementById('drinks-sections'));
    }

    function renderMenuType(type, targetContainer) {
      MENU[type].sections.forEach((section, sIdx) => {
        const sectionId = `sec-${type}-${sIdx}`;
        
        // Setup Accordion Button element
        const sectionBtn = document.createElement('button');
        sectionBtn.className = 'section-btn';
        sectionBtn.innerHTML = `<span>${section.label.toUpperCase()}</span><span class="arrow">▼</span>`;
        sectionBtn.onclick = () => toggleSection(sectionBtn, sectionId);
        
        // Setup Sub Grid Box element
        const itemGrid = document.createElement('div');
        itemGrid.className = 'item-grid';
        itemGrid.id = sectionId;

        section.items.forEach(item => {
          const itemBtn = document.createElement('button');
          itemBtn.className = 'item-btn';
          itemBtn.onclick = () => handleItemClick(item);

          const displayPrice = item.askSize 
            ? `£${item.prices.Small.toFixed(2)}–£${item.prices.Large.toFixed(2)}`
            : `£${item.price.toFixed(2)}`;

          itemBtn.innerHTML = `<span class="name">${item.name}</span><span class="price">${displayPrice}</span>`;
          itemGrid.appendChild(itemBtn);
        });

        targetContainer.appendChild(sectionBtn);
        targetContainer.appendChild(itemGrid);
      });
    }

    // Toggle Menu Accordions
    function toggleSection(btn, targetId) {
      const grid = document.getElementById(targetId);
      const isCurrentlyOpen = grid.style.display === 'grid';
      
      // Close sibling sections inside the same parent column
      const parentContainer = grid.parentElement;
      parentContainer.querySelectorAll('.item-grid').forEach(el => el.style.display = 'none');
      parentContainer.querySelectorAll('.section-btn').forEach(el => {
        el.classList.remove('open');
        el.querySelector('.arrow').innerText = '▼';
      });

      if (!isCurrentlyOpen) {
        grid.style.display = 'grid';
        btn.classList.add('open');
        btn.querySelector('.arrow').innerText = '▲';
      }
    }

    // Core Interactivity Actions
    function handleItemClick(item) {
      if (item.askSize || item.askBread || item.askGarnish) {
        modalState = {
          item: item,
          size: item.askSize ? SIZES[0] : null,
          bread: item.askBread ? BREAD[0].label : null,
          garnish: item.askGarnish ? GARNISH[0] : null
        };
        openOptionsModal();
      } else {
        addLine(item, null);
      }
    }

    function addLine(item, opts) {
      const price = calcPrice(item, opts);
      const key = lineKey(item.name, opts);
      const existingIdx = currentLines.findIndex(l => l.key === key);

      if (existingIdx >= 0) {
        currentLines[existingIdx].qty += 1;
      } else {
        currentLines.push({ key, name: item.name, price, qty: 1, opts });
      }
      
      closeOptionsModal();
      updateFooterBar();
    }

    function setQty(key, value) {
      const q = parseInt(value);
      if (isNaN(q) || q < 0) return;
      
      if (q === 0) {
        currentLines = currentLines.filter(l => l.key !== key);
      } else {
        const line = currentLines.find(l => l.key === key);
        if (line) line.qty = q;
      }
      updateFooterBar();
      renderOrderLines();
    }

    function removeLine(key) {
      currentLines = currentLines.filter(l => l.key !== key);
      updateFooterBar();
      renderOrderLines();
    }

    function clearOrder() {
      currentLines = [];
      updateFooterBar();
      closeOrderModal();
    }

    // Computed Properties & DOM Painters
    function updateFooterBar() {
      const total = currentLines.reduce((s, l) => s + (l.price * l.qty), 0);
      const itemCount = currentLines.reduce((s, l) => s + l.qty, 0);
      const footerBtn = document.getElementById('view-order-btn');
      const countLabel = document.getElementById('item-count-label');
      const totalLabel = document.getElementById('footer-total-label');

      if (currentLines.length > 0) {
        footerBtn.classList.add('has-items');
        countLabel.innerText = `VIEW ORDER (${itemCount} items)`;
        totalLabel.style.display = 'block';
        totalLabel.innerText = `£${total.toFixed(2)}`;
      } else {
        footerBtn.classList.remove('has-items');
        countLabel.innerText = 'VIEW ORDER';
        totalLabel.style.display = 'none';
      }
    }

    /* Modal Rendering Logic */
    function openOrderModal() {
      document.getElementById('order-modal').style.visibility = 'visible';
      renderOrderLines();
    }

    function closeOrderModal() {
      document.getElementById('order-modal').style.visibility = 'hidden';
    }

    function renderOrderLines() {
      const linesBox = document.getElementById('order-items-box');
      const totalBox = document.getElementById('sheet-total-box');
      const clearBtn = document.getElementById('clear-btn');
      
      linesBox.innerHTML = '';
      
      if (currentLines.length === 0) {
        linesBox.innerHTML = `<div class="empty-msg">Nothing added yet</div>`;
        totalBox.style.display = 'none';
        clearBtn.style.display = 'none';
        return;
      }

      totalBox.style.display = 'flex';
      clearBtn.style.display = 'block';

      let computedTotal = 0;
      currentLines.forEach(l => {
        computedTotal += (l.price * l.qty);
        const row = document.createElement('div');
        row.className = 'order-line-item';
        row.innerHTML = `
          <button class="remove-btn" onclick="removeLine('${l.key}')">✕</button>
          <span class="line-label">${lineLabel(l.name, l.opts)}</span>
          <input type="number" min="0" value="${l.qty}" class="qty-input" onchange="setQty('${l.key}', this.value)">
          <span class="line-total">£${(l.price * l.qty).toFixed(2)}</span>
        `;
        linesBox.appendChild(row);
      });

      document.getElementById('sheet-total-label').innerText = `£${computedTotal.toFixed(2)}`;
    }

    function openOptionsModal() {
      if (!modalState) return;
      document.getElementById('options-modal').style.visibility = 'visible';
      document.getElementById('opt-item-name').innerText = modalState.item.name;
      renderPickerOptions();
    }

    function closeOptionsModal() {
      modalState = null;
      document.getElementById('options-modal').style.visibility = 'hidden';
    }

    function updateModalPrice() {
      const calculated = calcPrice(modalState.item, modalState);
      document.getElementById('opt-item-price').innerText = `£${calculated.toFixed(2)}`;
      document.getElementById('opt-submit-btn').innerText = `Add £${calculated.toFixed(2)}`;
    }

    function renderPickerOptions() {
      const container = document.getElementById('dynamic-pickers-container');
      container.innerHTML = '';
      const item = modalState.item;

      if (item.askSize) {
        container.appendChild(createPickerGroup("SIZE", SIZES, modalState.size, (val) => {
          modalState.size = val;
          updateModalPrice();
          renderPickerOptions();
        }));
      }
      if (item.askBread) {
        container.appendChild(createPickerGroup("BREAD", BREAD, modalState.bread, (val) => {
          modalState.bread = val;
          updateModalPrice();
          renderPickerOptions();
        }));
      }
      if (item.askGarnish) {
        container.appendChild(createPickerGroup("SERVED WITH", GARNISH, modalState.garnish, (val) => {
          modalState.garnish = val;
          updateModalPrice();
          renderPickerOptions();
        }));
      }

      updateModalPrice();
      
      // Setup the item modal submit event triggers
      document.getElementById('opt-submit-btn').onclick = () => {
        addLine(modalState.item, {
          size: modalState.size,
          bread: modalState.bread,
          garnish: modalState.garnish
        });
      };
    }

    function createPickerGroup(label, options, currentSelection, onSelectCallback) {
      const group = document.createElement('div');
      group.className = 'picker-group';
      group.innerHTML = `<div class="picker-label">${label}</div>`;
      
      const row = document.createElement('div');
      row.className = 'picker-row';

      options.forEach(opt => {
        const isObj = typeof opt === 'object';
        const val = isObj ? opt.label : opt;
        const surchargeText = isObj && opt.surcharge > 0 ? ` +£${opt.surcharge.toFixed(2)}` : '';
        
        const btn = document.createElement('button');
        btn.className = `picker-btn ${currentSelection === val ? 'selected' : ''}`;
        btn.innerText = val + surchargeText;
        btn.onclick = () => onSelectCallback(val);
        
        row.appendChild(btn);
      });

      group.appendChild(row);
      return group;
    }

    // App Initialization Bootloader
    window.onload = setupMenu;
  </script>
</body>
</html>
