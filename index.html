<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* ─── THEME VARIABLES ─────────────────────────────────────────── */
  body.morning {
    --bg:           #f5f5f0;
    --bg-secondary: #ebebе6;
    --surface:      #ffffff;
    --surface-2:    #f0f0eb;
    --border:       #d8d8d2;
    --text:         #1a1a1a;
    --text-muted:   #666660;
    --text-faint:   #999993;
    --accent:       #1a6fd4;
    --accent-light: rgba(26,111,212,0.10);
    --acc-open-bg:  #e8e8e3;
    --acc-open-text:#1a1a1a;
    --item-bg:      #ffffff;
    --item-border:  #dcdcd7;
    --tab-bar-border: #d0d0ca;
  }
  body.lunch {
    --bg:           #3D3C3F;
    --bg-secondary: #343337;
    --surface:      #2e2d30;
    --surface-2:    #383639;
    --border:       #4a4850;
    --text:         #f0eef5;
    --text-muted:   #b0adb8;
    --text-faint:   #787580;
    --accent:       #7c6af5;
    --accent-light: rgba(124,106,245,0.15);
    --acc-open-bg:  #4a4850;
    --acc-open-text:#f0eef5;
    --item-bg:      #2e2d30;
    --item-border:  #4a4850;
    --tab-bar-border: rgba(255,255,255,0.06);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, sans-serif;
    font-size: 14px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.25s ease, color 0.25s ease;
  }
  button { font-family: inherit; }

  /* ─── TOP MENU TOGGLE BAR ─────────────────────────────────────── */
  .menu-toggle-container {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .menu-toggle-btn {
    flex: 1; padding: 14px 0; border: none; cursor: pointer;
    font-weight: 900; font-size: 13px; letter-spacing: 2px;
    background: transparent; color: var(--text-faint);
    text-align: center; position: relative; overflow: hidden;
    transition: color 0.2s;
  }
  .menu-toggle-btn::before {
    content: ''; position: absolute; bottom: 0; left: 0;
    height: 100%; width: 0%;
    background: var(--accent-light);
    transition: width 0s linear; z-index: 1;
  }
  .menu-toggle-btn.holding::before { width: 100%; transition: width 0.5s linear; }
  .menu-toggle-btn span { position: relative; z-index: 2; }

  /* Morning active tab */
  body.morning .menu-toggle-btn.active {
    background: var(--bg);
    color: var(--text);
    border-bottom: 3px solid var(--accent);
  }
  body.morning #menu-toggle-morning { border-right: 1px solid var(--border); }

  /* Lunch active tab */
  body.lunch #menu-toggle-lunch.active {
    background: var(--bg);
    color: var(--text);
    border-bottom: 3px solid var(--accent);
  }
  body.lunch #menu-toggle-morning {
    color: var(--text-faint);
    border-right: 1px solid var(--border);
  }

  /* ─── SUB TABS ────────────────────────────────────────────────── */
  .tabs-container {
    display: flex;
    background: var(--surface);
    flex-shrink: 0;
    border-bottom: 1px solid var(--tab-bar-border);
  }
  .tab-btn {
    flex: 1; padding: 12px 0; border: none; cursor: pointer;
    font-weight: 800; font-size: 12px; letter-spacing: 2px;
    background: transparent; color: var(--text-muted);
    border-bottom: 3px solid transparent; text-align: center;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn.active-tab {
    color: var(--text);
    border-bottom: 3px solid var(--accent);
  }

  /* ─── SCROLL AREA ─────────────────────────────────────────────── */
  .scroll-container {
    flex: 1; overflow-y: auto;
    background: var(--bg);
    padding-bottom: 20px;
    transition: background 0.25s ease;
  }

  /* ─── ACCORDION ───────────────────────────────────────────────── */
  .acc-btn {
    width: 100%; display: flex; justify-content: space-between; align-items: center;
    padding: 12px 14px; border: none; cursor: pointer;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    color: var(--text-muted);
    font-weight: 700; font-size: 12px; letter-spacing: 1.5px;
    transition: background 0.15s, color 0.15s;
  }
  .acc-btn.open {
    background: var(--acc-open-bg);
    color: var(--acc-open-text);
    border-bottom: 1px solid var(--border);
  }
  .acc-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; padding: 10px;
    background: var(--bg);
  }

  /* ─── ITEM BUTTONS ────────────────────────────────────────────── */
  .item-btn {
    padding: 12px 6px;
    background: var(--item-bg);
    border: 1px solid var(--item-border);
    border-radius: 10px; cursor: pointer;
    color: var(--text);
    text-align: center; line-height: 1.3; font-size: 12px;
    transition: border-color 0.15s, background 0.15s;
  }
  .item-btn:active {
    background: var(--accent-light);
    border-color: var(--accent);
  }
  .item-name { display: block; font-weight: 600; color: var(--text); }
  .item-price { display: block; color: var(--accent); font-weight: 700; margin-top: 3px; font-size: 13px; }

  /* ─── BOTTOM CONTROL BAR (always dark) ───────────────────────── */
  .custom-item-bar {
    background: #1c1b1e;
    border-top: 1px solid #2e2d32;
    padding: 8px 12px;
    flex-shrink: 0;
  }
  .service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .service-btn-active  { background: var(--accent) !important; color: #fff !important; }
  .service-btn-inactive { background: #2e2d32 !important; color: #888 !important; }

  .table-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
  .table-btn {
    padding: 11px 0; border: none; border-radius: 7px;
    background: #2a292d; color: #aaa;
    font-weight: 800; cursor: pointer; font-size: 13px;
    transition: background 0.15s, color 0.15s;
  }
  .table-btn.active { background: var(--accent); color: #fff; }

  #takeaway-name-input {
    width: 100%; padding: 10px; border-radius: 8px;
    border: 1px solid #3a3940; background: #252428;
    color: #f0eef5; font-weight: 700; font-size: 14px;
  }
  #takeaway-name-input::placeholder { color: #666; }

  .custom-item-btn {
    width: 100%; padding: 10px 0;
    border: 1px dashed #444; background: #252428;
    color: #888; border-radius: 6px;
    font-weight: 700; font-size: 13px; cursor: pointer;
    letter-spacing: 1px; text-align: center; transition: all 0.2s;
  }
  .custom-item-btn:hover { background: #333; color: #fff; border-color: #777; }

  /* ─── VIEW ORDER BUTTON ───────────────────────────────────────── */
  #order-btn {
    width: 100%; flex-shrink: 0; padding: 16px 20px; border: none;
    cursor: pointer; background: #1c1b1e; color: #555;
    font-weight: 800; font-size: 16px;
    display: flex; justify-content: space-between; align-items: center;
    border-top: 1px solid #2e2d32;
    transition: background 0.2s, color 0.2s;
  }
  #order-btn.has-items { background: var(--accent); color: #fff; }

  /* ─── ORDER SHEET OVERLAY ─────────────────────────────────────── */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 50; display: none; align-items: flex-end; }
  .overlay.show { display: flex; }
  .sheet { background: #1c1b1e; width: 100%; max-height: 85vh; display: flex; flex-direction: column; border-radius: 16px 16px 0 0; }
  .sheet-head { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 1px solid #2e2d32; flex-shrink: 0; }
  .sheet-head span { font-weight: 800; font-size: 16px; color: #f0eef5; }
  .sheet-btns { display: flex; gap: 8px; }
  .btn-clear { background: #7a1f1f; color: #ffaaaa; border: none; border-radius: 6px; padding: 7px 14px; cursor: pointer; font-weight: 700; font-size: 13px; }
  .btn-close { background: #2e2d32; color: #ccc; border: none; border-radius: 6px; padding: 7px 14px; cursor: pointer; font-weight: 700; font-size: 13px; }
  .sheet-body { overflow-y: auto; flex: 1; padding: 0 14px; }
  .order-section-title { font-size: 11px; font-weight: 800; letter-spacing: 2px; color: #666; padding: 10px 0 4px; }
  .order-line { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #2a292d; }
  .order-line .remove { background: none; border: none; color: #cc4444; cursor: pointer; font-size: 16px; padding: 0; flex-shrink: 0; width: 24px; height: 24px; }
  .order-line .lname { flex: 1; font-size: 13px; line-height: 1.3; color: #dddbe2; }
  .order-line input { width: 44px; text-align: center; background: #252428; border: 1px solid #3a3940; border-radius: 4px; color: #fff; padding: 4px 0; font-size: 14px; }
  .order-line .lprice { min-width: 52px; text-align: right; color: #7c6af5; font-weight: 700; font-size: 14px; }
  .empty-msg { color: #444; text-align: center; padding: 40px 0; font-size: 15px; }

  /* ─── DISCOUNT ROW ────────────────────────────────────────────── */
  .discount-row-active { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; background: #2a1a1a; border-top: 1px solid #4a2222; color: #ff7070; font-size: 13px; font-weight: 700; }
  .discount-row-active button { background: none; border: none; color: #ff7070; cursor: pointer; font-size: 14px; font-weight: 800; }

  /* ─── TOTAL BAR ───────────────────────────────────────────────── */
  .sheet-total-container { background: #111013; border-top: 2px solid #2a292d; flex-shrink: 0; display: flex; flex-direction: column; }
  .discount-hold-btn {
    width: 100%; padding: 10px 0; border: none;
    background: #1c1b1e; color: #d4894a;
    font-weight: 800; font-size: 12px; letter-spacing: 1px;
    cursor: pointer; text-align: center;
    position: relative; overflow: hidden; border-bottom: 1px solid #2e2d32;
  }
  .discount-hold-btn::before { content: ''; position: absolute; bottom: 0; left: 0; height: 100%; width: 0%; background: rgba(212,137,74,0.18); transition: width 0s linear; z-index: 1; }
  .discount-hold-btn.holding::before { width: 100%; transition: width 1s linear; }
  .discount-hold-btn span { position: relative; z-index: 2; }

  .sheet-total { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .sheet-total div { display: flex; flex-direction: column; gap: 2px; }
  .sheet-total div span:first-child { color: #555; font-size: 11px; font-weight: 700; letter-spacing: 2px; }
  .sheet-total div span:last-child { font-size: 36px; font-weight: 900; color: #7c6af5; }

  #send-to-kitchen-btn {
    background: #20bf6b; color: white; border: none;
    padding: 12px 16px; border-radius: 10px;
    font-weight: 800; cursor: pointer; font-size: 13px;
    letter-spacing: 0.5px;
    transition: opacity 0.15s;
  }
  #send-to-kitchen-btn:hover { opacity: 0.88; }

  /* ─── OPTIONS MODAL ───────────────────────────────────────────── */
  #opt-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 99; display: none; align-items: center; justify-content: center; padding: 20px; }
  #opt-overlay.show { display: flex; }
  #opt-box { background: #1c1b1e; border-radius: 12px; padding: 20px; width: 100%; max-width: 360px; border: 1px solid #2e2d32; max-height: 80vh; overflow-y: auto; }
  #opt-title { font-weight: 800; font-size: 16px; margin-bottom: 2px; color: #f0eef5; }
  #opt-price { color: #7c6af5; font-weight: 800; font-size: 22px; margin-bottom: 16px; }
  .opt-group { margin-bottom: 14px; }
  .opt-label { font-size: 10px; color: #666; letter-spacing: 1.5px; margin-bottom: 8px; text-transform: uppercase; }
  .opt-row { display: flex; gap: 7px; flex-wrap: wrap; }
  .opt-btn { flex: 1; min-width: 70px; padding: 10px 4px; border-radius: 7px; border: 1px solid #3a3940; cursor: pointer; font-weight: 700; font-size: 12px; background: #252428; color: #ccc; line-height: 1.4; transition: background 0.12s, color 0.12s; }
  .opt-btn.selected { background: #7c6af5; color: #fff; border-color: #7c6af5; }
  .opt-actions { display: flex; gap: 8px; margin-top: 18px; }
  #opt-cancel { flex: 1; padding: 12px 0; background: #252428; color: #aaa; border: 1px solid #3a3940; border-radius: 7px; cursor: pointer; font-weight: 700; }
  #opt-add { flex: 2; padding: 12px 0; background: #7c6af5; color: #fff; border: none; border-radius: 7px; cursor: pointer; font-weight: 800; font-size: 15px; transition: opacity 0.15s; }
  #opt-add:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ─── NUMERIC PAD ─────────────────────────────────────────────── */
  .num-input-wrap { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
  .num-display { width: 100%; padding: 12px; background: #111013; border: 1px solid #2e2d32; border-radius: 8px; font-size: 26px; font-weight: 900; text-align: right; color: #20bf6b; letter-spacing: 1px; }
  .num-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .num-btn { padding: 14px 0; background: #252428; color: #ddd; border: none; border-radius: 7px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.1s; }
  .num-btn:active { background: #7c6af5; color: #fff; }

  /* ─── ICE CREAM SUBHEADING ────────────────────────────────────── */
  .ice-subheading {
    grid-column: span 3;
    background: var(--surface-2);
    color: var(--text-muted);
    font-weight: 800; font-size: 10px;
    padding: 6px 10px; margin-top: 4px;
    border-radius: 5px; letter-spacing: 1.5px;
    text-transform: uppercase;
    border-left: 3px solid var(--accent);
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

function setupHoldToSwitchButton(elementId,menuKey){
  const btn=document.getElementById(elementId);
  const startHold=(e)=>{
    if(activeMainMenu===menuKey)return;
    holdTargetMenu=menuKey; btn.classList.add("holding");
    holdTimer=setTimeout(()=>{switchMainMenu(menuKey);endHold();},500);
  };
  const endHold=()=>{
    if(holdTimer)clearTimeout(holdTimer);
    btn.classList.remove("holding"); holdTargetMenu=null;
  };
  btn.addEventListener("mousedown",startHold); btn.addEventListener("mouseup",endHold); btn.addEventListener("mouseleave",endHold);
  btn.addEventListener("touchstart",(e)=>{e.preventDefault();startHold(e);},{passive:false});
  btn.addEventListener("touchend",endHold); btn.addEventListener("touchcancel",endHold);
}

function createItemButton(item){
  const btn=document.createElement("button"); btn.className="item-btn";
  let priceStr="";
  if(item.askSize){
    priceStr="£"+item.prices.Small.toFixed(2)+"–£"+item.prices.Large.toFixed(2);
  } else if(item.askIceCreamFlavour){
    priceStr="£3.25 / £3.50";
  } else if(item.askWineSize){
    const vals=Object.values(item.winePrices);
    priceStr="£"+Math.min(...vals).toFixed(2)+"–£"+Math.max(...vals).toFixed(2);
  } else if(item.askCoffeeType||item.askHotChocolateType||item.askWaterType){
    const vals=Object.values(item.basePrices);
    priceStr="£"+Math.min(...vals).toFixed(2)+"–£"+Math.max(...vals).toFixed(2);
  } else if(item.askTeaServe){
    const min=Math.min(...TEA_SERVE_OPTIONS.map(t=>t.price));
    const max=Math.max(...TEA_SERVE_OPTIONS.map(t=>t.price));
    priceStr="£"+min.toFixed(2)+"–£"+max.toFixed(2);
  } else {
    priceStr="£"+item.price.toFixed(2);
  }
  btn.innerHTML="<span class='item-name'>"+item.name+"</span><span class='item-price'>"+priceStr+"</span>";
  btn.addEventListener("click",()=>tapItem(item));
  return btn;
}

function lineLabel(name,opts){
  if(!opts)return name;
  const parts=[opts.coffeeType,opts.teaType,opts.hotChocolateType,opts.teaServe,opts.fruitTeaFlavour,opts.waterType,opts.wineSize,opts.flavour,opts.cone,opts.flake,opts.size,opts.bread,opts.garnish,opts.sauce,opts.milk,
    opts.extraShot&&opts.extraShot!=="No Extra Shot"?opts.extraShot:null,
    opts.syrup&&opts.syrup!=="No Syrup"?opts.syrup:null,
    opts.preserves&&opts.preserves!=="No Preserves"?opts.preserves:null
  ].filter(Boolean);
  return parts.length?name+" ("+parts.join(", ")+")":name;
}

function calcPrice(item,opts){
  if(item.isCustom)return item.price;
  if(item.askWineSize)return item.winePrices[opts.wineSize];
  if(item.askCoffeeType){
    const base=item.basePrices[opts.coffeeType];
    const milk=opts.milk?MILKS.find(m=>m.label===opts.milk):null;
    const shot=opts.extraShot?EXTRA_SHOT_OPTIONS.find(e=>e.label===opts.extraShot):null;
    const syrup=opts.syrup?SYRUP_OPTIONS.find(s=>s.label===opts.syrup):null;
    return base+(milk?milk.surcharge:0)+(shot?shot.surcharge:0)+(syrup?syrup.surcharge:0);
  }
  if(item.askWaterType)return item.basePrices[opts.waterType];
  if(item.askTeaServe){
    const selected=TEA_SERVE_OPTIONS.find(t=>t.label===opts.teaServe);
    return selected?selected.price:3.00;
  }
  if(item.askHotChocolateType)return item.basePrices[opts.hotChocolateType];
  if(item.askIceCreamFlavour&&opts){
    const selectedCone=CONE_TYPES.find(c=>c.label===opts.cone);
    const selectedFlake=FLAKE_OPTIONS.find(f=>f.label===opts.flake);
    return (selectedCone?selectedCone.basePrice:3.25)+(selectedFlake?selectedFlake.surcharge:0);
  }
  if(item.askSize)return item.prices[(opts&&opts.size)||"Small"];
  const base=item.price||0;
  const bread=opts&&opts.bread?BREAD.find(b=>b.label===opts.bread):null;
  const milk=opts&&opts.milk?MILKS.find(m=>m.label===opts.milk):null;
  const shot=opts&&opts.extraShot?EXTRA_SHOT_OPTIONS.find(e=>e.label===opts.extraShot):null;
  const syrup=opts&&opts.syrup?SYRUP_OPTIONS.find(s=>s.label===opts.syrup):null;
  const preserves=opts&&opts.preserves?PRESERVES_OPTIONS.find(p=>p.label===opts.preserves):null;
  return base+(bread?bread.surcharge:0)+(milk?milk.surcharge:0)+(shot?shot.surcharge:0)+(syrup?syrup.surcharge:0)+(preserves?preserves.surcharge:0);
}

function makeOptGroup(label,options,selected,onSelect){
  const div=document.createElement("div"); div.className="opt-group";
  div.innerHTML="<div class='opt-label'>"+label+"</div>";
  const row=document.createElement("div"); row.className="opt-row";
  for(const opt of options){
    const val=typeof opt==="object"?opt.label:opt;
    const sub=typeof opt==="object"&&opt.surcharge>0?" +£"+opt.surcharge.toFixed(2):"";
    const btn=document.createElement("button");
    btn.className="opt-btn"+(selected===val?" selected":"");
    btn.textContent=val+sub;
    btn.addEventListener("click",()=>onSelect(val));
    row.appendChild(btn);
  }
  div.appendChild(row); return div;
}

function makeNumericEntryPad(){
  const wrap=document.createElement("div"); wrap.className="num-input-wrap";
  const display=document.createElement("div"); display.className="num-display";
  display.textContent="£"+(parseInt(customAmountBuffer)/100).toFixed(2);
  wrap.appendChild(display);
  const grid=document.createElement("div"); grid.className="num-grid";
  ["1","2","3","4","5","6","7","8","9","CLR","0","X"].forEach(k=>{
    const btn=document.createElement("button"); btn.className="num-btn";
    btn.textContent=k; btn.type="button";
    btn.addEventListener("click",()=>handleNumPress(k,display));
    grid.appendChild(btn);
  });
  wrap.appendChild(grid); return wrap;
}

function handleNumPress(key,displayElement){
  if(key==="CLR"){customAmountBuffer="0";}
  else if(key==="X"){customAmountBuffer=customAmountBuffer.length>1?customAmountBuffer.slice(0,-1):"0";}
  else{if(customAmountBuffer==="0"){customAmountBuffer=key;}else if(customAmountBuffer.length<7){customAmountBuffer+=key;}}
  const numericVal=parseInt(customAmountBuffer)/100;
  modalItem.price=numericVal;
  displayElement.textContent="£"+numericVal.toFixed(2);
  updateModalPrice();
  document.getElementById("opt-add").disabled=(numericVal<=0);
}

function openCustomAmountModal(){
  customAmountBuffer="0";
  modalItem={name:"Custom Charge Item",price:0,isCustom:true};
  modalOpts={};
  renderModal();
  document.getElementById("opt-add").disabled=true;
  document.getElementById("opt-overlay").classList.add("show");
}

function updateModalPrice(){
  const p=calcPrice(modalItem,modalOpts);
  document.getElementById("opt-price").textContent="£"+p.toFixed(2);
  document.getElementById("opt-add").textContent="Add £"+p.toFixed(2);
}

function closeModal(){document.getElementById("opt-overlay").classList.remove("show");}

function addLine(item,opts){
  const price=calcPrice(item,opts);
  let displayName=item.name;
  if(item.askIceCreamFlavour&&opts)displayName=opts.flavour+" Scoop";
  else if(item.askSupremeFlavour&&opts)displayName=opts.flavour+" Supreme";
  else if(item.askSqueezeFlavour&&opts)displayName=opts.flavour+" Squeeze Up";
  const key=lineKey(displayName,opts);
  const idx=lines.findIndex(l=>l.key===key);
  let categorisedAsFood=false;
  if(item.isCustom){categorisedAsFood=true;}
  else{
    outerLoop:
    for(const menuKey in DATASETS){
      const menu=DATASETS[menuKey];
      for(const tabKey in menu){
        const tab=menu[tabKey];
        if(!tab.sections)continue;
        for(const section of tab.sections){
          if(section.items.some(i=>i.name===item.name)){categorisedAsFood=true;break outerLoop;}
        }
      }
    }
  }
  if(idx>=0){lines[idx].qty++;}
  else{lines.push({key,name:displayName,price,qty:1,opts,food:categorisedAsFood,note:""});}
  updateOrderBtn();
}

function removeLineAtIndex(index){lines.splice(index,1);updateOrderBtn();renderOrderSheet();}
function lineKey(name,opts){return name+JSON.stringify(opts||{});}

function updateLineQtyAtIndex(index,value){
  const qty=parseInt(value);
  if(isNaN(qty)||qty<0)return;
  if(qty===0){removeLineAtIndex(index);return;}
  lines[index].qty=qty; updateOrderBtn(); renderOrderSheet();
}

function updateOrderBtn(){
  const btn=document.getElementById("order-btn");
  const label=document.getElementById("order-btn-label");
  const tot=document.getElementById("order-btn-total");
  let total=lines.reduce((s,l)=>s+l.price*l.qty,0);
  if(discountApplied)total*=0.85;
  const count=lines.reduce((s,l)=>s+l.qty,0);
  if(lines.length>0){btn.classList.add("has-items");label.textContent="VIEW ORDER ("+count+" items)";tot.textContent="£"+total.toFixed(2);}
  else{btn.classList.remove("has-items");label.textContent="VIEW ORDER";tot.textContent="";}
}

function openOrder(){renderOrderSheet();document.getElementById("order-overlay").classList.add("show");}
function closeOrder(){document.getElementById("order-overlay").classList.remove("show");}
function clearAll(){lines=[];discountApplied=false;updateOrderBtn();closeOrder();}

function setupDiscountHoldAction(){
  const btn=document.getElementById("discount-hold-action");
  const startHold=(e)=>{
    if(discountApplied||lines.length===0)return;
    btn.classList.add("holding");
    discountHoldTimer=setTimeout(()=>{discountApplied=true;updateOrderBtn();renderOrderSheet();endHold();},1000);
  };
  const endHold=()=>{if(discountHoldTimer)clearTimeout(discountHoldTimer);btn.classList.remove("holding");};
  btn.addEventListener("mousedown",startHold); btn.addEventListener("mouseup",endHold); btn.addEventListener("mouseleave",endHold);
  btn.addEventListener("touchstart",(e)=>{e.preventDefault();startHold(e);},{passive:false});
  btn.addEventListener("touchend",endHold); btn.addEventListener("touchcancel",endHold);
}

function removeDiscount(){discountApplied=false;updateOrderBtn();renderOrderSheet();}

function renderOrderSheet(){
  const body=document.getElementById("order-body");
  const totalBar=document.getElementById("order-total-bar");
  const totalAmt=document.getElementById("order-total-amt");
  const discountRow=document.getElementById("discount-status-row");
  const holdDiscountBtn=document.getElementById("discount-hold-action");
  body.innerHTML="";
  if(lines.length===0){body.innerHTML="<div class='empty-msg'>Nothing added yet</div>";totalBar.style.display="none";discountRow.style.display="none";return;}
  const lineItemsWithIndex=lines.map((line,originalIndex)=>({...line,originalIndex}));
  const foodLines=lineItemsWithIndex.filter(l=>l.food);
  const drinkLines=lineItemsWithIndex.filter(l=>!l.food);
  if(foodLines.length>0){const t=document.createElement("div");t.className="order-section-title";t.textContent="FOOD ITEMS";body.appendChild(t);foodLines.forEach(l=>body.appendChild(createLineRowElement(l,l.originalIndex)));}
  if(drinkLines.length>0){const t=document.createElement("div");t.className="order-section-title";t.textContent="BEVERAGES & SNACKS";body.appendChild(t);drinkLines.forEach(l=>body.appendChild(createLineRowElement(l,l.originalIndex)));}
  let total=lines.reduce((s,l)=>s+l.price*l.qty,0);
  if(discountApplied){total*=0.85;discountRow.style.display="flex";holdDiscountBtn.style.display="none";}
  else{discountRow.style.display="none";holdDiscountBtn.style.display="block";}
  totalAmt.textContent="£"+total.toFixed(2);
  totalBar.style.display="flex";
}

function createLineRowElement(l,realIdx){
  const div=document.createElement("div"); div.className="order-line";
  const remBtn=document.createElement("button"); remBtn.className="remove"; remBtn.textContent="X";
  remBtn.addEventListener("click",()=>removeLineAtIndex(realIdx));
  const textLabel=document.createElement("span"); textLabel.className="lname";
  textLabel.textContent=lineLabel(l.name,l.opts);
  if(l.note)textLabel.innerHTML+="<br><small style='color:#ffcc66'>NOTE: "+l.note+"</small>";
  const numInput=document.createElement("input"); numInput.type="number"; numInput.min="0"; numInput.value=l.qty;
  numInput.addEventListener("change",(e)=>updateLineQtyAtIndex(realIdx,e.target.value));
  const noteBtn=document.createElement("button"); noteBtn.textContent="NOTE";
  noteBtn.style.cssText="background:#2a292d;color:#aaa;border:1px solid #3a3940;border-radius:4px;padding:4px 8px;cursor:pointer;font-size:11px;font-weight:700;";
  noteBtn.addEventListener("click",()=>{const n=prompt("Chef note:",l.note||"");if(n!==null){lines[realIdx].note=n;renderOrderSheet();}});
  const priceLabel=document.createElement("span"); priceLabel.className="lprice";
  priceLabel.textContent="£"+(l.price*l.qty).toFixed(2);
  const editBtn=document.createElement("button"); editBtn.textContent="EDIT";
  editBtn.style.cssText="background:#2a292d;border:1px solid #3a3940;color:#aaa;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:11px;font-weight:700;";
  editBtn.addEventListener("click",()=>{
    let sourceItem=null;
    for(const menuKey in DATASETS){
      const menu=DATASETS[menuKey];
      for(const tabKey in menu){
        const tab=menu[tabKey];
        if(!tab.sections)continue;
        for(const section of tab.sections){
          const found=section.items.find(i=>{
            if(l.name===i.name)return true;
            if(i.askIceCreamFlavour&&l.name.endsWith(" Scoop"))return true;
            if(i.askSupremeFlavour&&l.name.endsWith(" Supreme"))return true;
            if(i.askSqueezeFlavour&&l.name.endsWith(" Squeeze Up"))return true;
            return false;
          });
          if(found){sourceItem=found;break;}
        }
      }
    }
    if(!sourceItem){alert("Cannot edit this item");return;}
    modalItem=sourceItem;
    modalOpts={
      wineSize:l.opts?.wineSize||null, coffeeType:l.opts?.coffeeType||null,
      teaType:l.opts?.teaType||null, hotChocolateType:l.opts?.hotChocolateType||null,
      teaServe:l.opts?.teaServe||null, fruitTeaFlavour:l.opts?.fruitTeaFlavour||null,
      size:l.opts?.size||null, bread:l.opts?.bread||null, garnish:l.opts?.garnish||null,
      sauce:l.opts?.sauce||null, milk:l.opts?.milk||null, waterType:l.opts?.waterType||null,
      cone:l.opts?.cone||null, flavour:l.opts?.flavour||null, flake:l.opts?.flake||null,
      extraShot:l.opts?.extraShot||null, syrup:l.opts?.syrup||null, preserves:l.opts?.preserves||null
    };
    renderModal(); document.getElementById("opt-overlay").classList.add("show");
    const addBtn=document.getElementById("opt-add");
    addBtn.onclick=()=>{
      lines[realIdx].opts={...modalOpts}; lines[realIdx].price=calcPrice(modalItem,modalOpts);
      let updatedName=modalItem.name;
      if(modalItem.askIceCreamFlavour)updatedName=modalOpts.flavour+" Scoop";
      else if(modalItem.askSupremeFlavour)updatedName=modalOpts.flavour+" Supreme";
      else if(modalItem.askSqueezeFlavour)updatedName=modalOpts.flavour+" Squeeze Up";
      lines[realIdx].name=updatedName; lines[realIdx].key=lineKey(updatedName,modalOpts);
      closeModal(); renderOrderSheet(); updateOrderBtn(); addBtn.onclick=confirmAdd;
    };
  });
  div.appendChild(remBtn); div.appendChild(textLabel);
  if(l.opts)div.appendChild(editBtn);
  div.appendChild(numInput); div.appendChild(noteBtn); div.appendChild(priceLabel);
  return div;
}

async function sendOrderToKitchen(){
  if(lines.length===0){alert("No items in order");return;}
  if(serviceType==="takeaway"&&takeawayName.trim()===""){alert("Enter customer name for takeaway");return;}
  try{
    const orderGroup=(crypto.randomUUID&&crypto.randomUUID())||('xxxxxxx-xxxx-4xxx-yxxx-xxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;const v=c==='x'?r:(r&0x3|0x8);return v.toString(16);}));
    const orderRows=lines.map(line=>({
      order_group:orderGroup,
      item:line.name,
      category:line.food?"food":"drink",
      service_type:serviceType,
      table_number:serviceType==="table"?tableNumber:null,
      customer_name:serviceType==="takeaway"?takeawayName:null,
      details:[
        "Qty: "+line.qty,
        line.opts?.size?"Size: "+line.opts.size:null,
        line.opts?.bread?"Bread: "+line.opts.bread:null,
        line.opts?.garnish?"Garnish: "+line.opts.garnish:null,
        line.opts?.sauce?"Sauce: "+line.opts.sauce:null,
        line.opts?.milk?"Milk: "+line.opts.milk:null,
        line.opts?.coffeeType?"Coffee: "+line.opts.coffeeType:null,
        line.opts?.teaType?"Tea: "+line.opts.teaType:null,
        line.opts?.teaServe?"Serve: "+line.opts.teaServe:null,
        line.opts?.fruitTeaFlavour?"Fruit Tea: "+line.opts.fruitTeaFlavour:null,
        line.opts?.waterType?"Water: "+line.opts.waterType:null,
        line.opts?.cone?"Cone: "+line.opts.cone:null,
        line.opts?.flake?"Flake: "+line.opts.flake:null,
        line.opts?.flavour?"Flavour: "+line.opts.flavour:null,
        line.opts?.extraShot&&line.opts.extraShot!=="No Extra Shot"?"Extra Shot: Yes":null,
        line.opts?.syrup&&line.opts.syrup!=="No Syrup"?"Syrup: Yes":null,
        line.opts?.preserves&&line.opts.preserves!=="No Preserves"?"Preserves: Yes":null,
        line.note?"NOTE: "+line.note:null,
        "Price: £"+line.price
      ].filter(Boolean).join(" | "),
      status:"new",
      created_at:new Date().toISOString()
    }));
    const{data,error}=await supabaseClient.from("cafe_orders").insert(orderRows).select();
    if(error){alert("Supabase Error: "+error.message);return;}
    alert("Order sent successfully");
    lines=[];discountApplied=false;updateOrderBtn();renderOrderSheet();
  }catch(err){console.error(err);alert("Crash: "+err.message);}
}

switchMainMenu("morning");
