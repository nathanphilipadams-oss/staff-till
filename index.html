    flex: 1;

    background: transparent;

  /* Visual Progress Bar Layer */
  .menu-toggle-btn::before {
    content: '';

    height: 100%;
    width: 0%;
    background: rgba(0, 168, 255, 0.15);
    transition: width 0s linear;
    z-index: 1;

    width: 100%;
    transition: width 0.5s linear;
  }

    position: relative;
    z-index: 2;
  }

function setupHoldToSwitchButton(elementId, menuKey) {
  const btn = document.getElementById(elementId);

  const startHold = (e) => {
    if (activeMainMenu === menuKey) return;
    holdTargetMenu = menuKey;
    btn.classList.add("holding");
    
    holdTimer = setTimeout(() => {
      switchMainMenu(menuKey);
      endHold();
    }, 500);
  };

  const endHold = () => {
    if (holdTimer) clearTimeout(holdTimer);
    btn.classList.remove("holding");
    holdTargetMenu = null;
  };

  btn.addEventListener("mousedown", startHold);
  btn.addEventListener("mouseup", endHold);
  btn.addEventListener("mouseleave", endHold);

  btn.addEventListener("touchstart", (e) => { e.preventDefault(); startHold(e); }, { passive: false });
  btn.addEventListener("touchend", endHold);
  btn.addEventListener("touchcancel", endHold);
}

function switchMainMenu(menuKey) {
  activeMainMenu = menuKey;
  activeSubTab = DATASETS[menuKey].tabs[0];
  
  document.getElementById("menu-toggle-morning").classList.toggle("active", menuKey === "morning");
  document.getElementById("menu-toggle-lunch").classList.toggle("active", menuKey === "lunch");
  
  openSections = {};
  renderSubTabsBar();
  switchSubTab(activeSubTab);
}

function renderSubTabsBar() {
  const container = document.getElementById("sub-tabs-bar");
  container.innerHTML = "";
  const dataset = DATASETS[activeMainMenu];
  
  dataset.tabs.forEach(tabKey => {
    const btn = document.createElement("button");
    btn.className = "tab-btn";
    btn.textContent = dataset.tabLabels[tabKey];

    btn.addEventListener("click", () => switchSubTab(tabKey));

    container.appendChild(btn);
  });
}
function switchSubTab(tabKey) {
  activeSubTab = tabKey;
  openSections = {};
  renderMenuGrid();
}
function renderMenuGrid() {

  const container = document.getElementById("menu-scroll-view");

  container.innerHTML = "";

  const currentCategoryData = DATASETS[activeMainMenu][activeSubTab];

  if (!currentCategoryData) return;

  const sectionsList = currentCategoryData.sections;

  const standardOnlyOne = (sectionsList.length === 1);

  sectionsList.forEach(section => {

    const sectionId =
      activeMainMenu + "_" +
      activeSubTab + "_" +
      section.label;

    if (openSections[sectionId] === undefined) {
      openSections[sectionId] = standardOnlyOne;
    }

    const isSectionOpen = openSections[sectionId];

    const accBtn = document.createElement("button");

    accBtn.className =
      "acc-btn" + (isSectionOpen ? " open" : "");

    accBtn.innerHTML =
      "<span>" +
      section.label.toUpperCase() +
      "</span><span>" +
      (isSectionOpen ? "▲" : "▼") +
      "</span>";

    accBtn.addEventListener("click", () => {

      openSections[sectionId] =
        !openSections[sectionId];

      renderMenuGrid();

    });

    container.appendChild(accBtn);

    if (isSectionOpen) {

      const grid = document.createElement("div");

      grid.className = "acc-grid";

      if (section.label === "Ice Cream Selection") {

        const subHeadingStyles =
          "grid-column: span 3; background: #222; color: #aaa; font-weight: 800; font-size: 11px; padding: 6px 10px; margin-top: 5px; border-radius: 4px; letter-spacing: 1px; text-transform: uppercase;";

        const sub1 = document.createElement("div");

        sub1.style = subHeadingStyles;

        sub1.textContent = "Cones & Tubs";

        grid.appendChild(sub1);

        section.items
          .filter(i => i.subHeading === "Cones & Tubs")
          .forEach(item => {

            grid.appendChild(createItemButton(item));

          });

        const sub2 = document.createElement("div");

        sub2.style =
          subHeadingStyles + " margin-top: 12px;";

        sub2.textContent =
          "Packaged Lollies & Tubs";

        grid.appendChild(sub2);

        section.items
          .filter(i =>
            i.subHeading ===
            "Packaged Lollies & Tubs"
          )
          .forEach(item => {

            grid.appendChild(createItemButton(item));

          });

      } else {

        section.items.forEach(item => {

          grid.appendChild(createItemButton(item));

        });

      }

      container.appendChild(grid);

    }

  });

}
function createItemButton(item) {
  const btn = document.createElement("button");
  btn.className = "item-btn";
  
  let priceStr = "";
  if (item.askSize) {
    priceStr = "£" + item.prices.Small.toFixed(2) + "–£" + item.prices.Large.toFixed(2);
  } else if (item.askIceCreamFlavour) {
    priceStr = "£3.25 / £3.50";
  } else {
    priceStr = "£" + item.price.toFixed(2);
  }
  
  btn.innerHTML = "<span class='item-name'>" + item.name + "</span><span class='item-price'>" + priceStr + "</span>";
  btn.addEventListener("click", () => tapItem(item));
  return btn;
}

function lineKey(name, opts) {
  return name + (opts ? JSON.stringify(opts) : "");
}

function lineLabel(name, opts) {
  if (!opts) return name;
  const parts = [
    opts.flavour, opts.cone, opts.flake,
    opts.size, opts.bread, opts.garnish, opts.milk
  ].filter(Boolean);
  return parts.length ? name + " (" + parts.join(", ") + ")" : name;
}

function calcPrice(item, opts) {
  if (item.isCustom) return item.price;

  if (item.askIceCreamFlavour && opts) {
    const selectedCone = CONE_TYPES.find(c => c.label === opts.cone);
    const selectedFlake = FLAKE_OPTIONS.find(f => f.label === opts.flake);
    const base = selectedCone ? selectedCone.basePrice : 3.25;
    const extra = selectedFlake ? selectedFlake.surcharge : 0;
    return base + extra;
  }

  if (item.askSize) {
    return item.prices[(opts && opts.size) || "Small"];
  }
  
  const base = item.price || 0;
  const bread = opts && opts.bread ? BREAD.find(b => b.label === opts.bread) : null;
  const milk = opts && opts.milk ? MILKS.find(m => m.label === opts.milk) : null;
  return base + (bread ? bread.surcharge : 0) + (milk ? milk.surcharge : 0);
}

function tapItem(item) {
  if (item.askSize || item.askBread || item.askGarnish || item.askMilk || item.askIceCreamFlavour || item.askSupremeFlavour || item.askSqueezeFlavour) {
    modalItem = item;
    modalOpts = {
      size: item.askSize ? SIZES[0] : null,
      bread: item.askBread ? BREAD[0].label : null,
      garnish: item.askGarnish ? GARNISH[0] : null,
      milk: item.askMilk ? MILKS[0].label : null,
      cone: item.askIceCreamFlavour ? CONE_TYPES[0].label : null,
      flavour: item.askIceCreamFlavour ? ICE_CREAM_FLAVOURS[0] : (item.askSupremeFlavour ? SUPREME_FLAVOURS[0] : (item.askSqueezeFlavour ? SQUEEZE_FLAVOURS[0] : null)),
      flake: item.askIceCreamFlavour ? FLAKE_OPTIONS[0].label : null
    };
    renderModal();
    document.getElementById("opt-overlay").classList.add("show");
  } else {
    addLine(item, null);
  }
}

function renderModal() {
  document.getElementById("opt-title").textContent = modalItem.name;
  updateModalPrice();
  const groups = document.getElementById("opt-groups");
  groups.innerHTML = "";

  if (modalItem.isCustom) {
    groups.appendChild(makeNumericEntryPad());
    return;
  }

  if (modalItem.askIceCreamFlavour) {
    groups.appendChild(makeOptGroup("FLAVOUR", ICE_CREAM_FLAVOURS.map(f => ({ label: f, surcharge: 0 })), modalOpts.flavour, f => { modalOpts.flavour = f; renderModal(); }));
    groups.appendChild(makeOptGroup("CONE SELECTION", CONE_TYPES.map(c => ({ label: c.label, surcharge: 0 })), modalOpts.cone, c => { modalOpts.cone = c; renderModal(); }));
    groups.appendChild(makeOptGroup("FLAKE OPTION", FLAKE_OPTIONS.map(f => ({ label: f.label, surcharge: 0 })), modalOpts.flake, f => { modalOpts.flake = f; renderModal(); }));
  }

  if (modalItem.askSupremeFlavour) {
    groups.appendChild(makeOptGroup("SUPREME SELECTION", SUPREME_FLAVOURS.map(f => ({ label: f, surcharge: 0 })), modalOpts.flavour, f => { modalOpts.flavour = f; renderModal(); }));
  }

  if (modalItem.askSqueezeFlavour) {
    groups.appendChild(makeOptGroup("FLAVOUR SELECTION", SQUEEZE_FLAVOURS.map(f => ({ label: f, surcharge: 0 })), modalOpts.flavour, f => { modalOpts.flavour = f; renderModal(); }));
  }

  if (modalItem.askSize) groups.appendChild(makeOptGroup("SIZE", SIZES.map(s => ({ label: s, surcharge: 0 })), modalOpts.size, s => { modalOpts.size = s; renderModal(); }));
  if (modalItem.askBread) groups.appendChild(makeOptGroup("BREAD", BREAD, modalOpts.bread, b => { modalOpts.bread = b; renderModal(); }));
  if (modalItem.askGarnish) groups.appendChild(makeOptGroup("SERVED WITH", GARNISH.map(g => ({ label: g, surcharge: 0 })), modalOpts.garnish, g => { modalOpts.garnish = g; renderModal(); }));
  if (modalItem.askMilk) groups.appendChild(makeOptGroup("MILK OPTION", MILKS, modalOpts.milk, m => { modalOpts.milk = m; renderModal(); }));
}

function makeOptGroup(label, options, selected, onSelect) {
  const div = document.createElement("div");
  div.className = "opt-group";
  div.innerHTML = "<div class='opt-label'>" + label + "</div>";
  const row = document.createElement("div");
  row.className = "opt-row";
  for(const opt of options) {
    const val = typeof opt === "object" ? opt.label : opt;
    const sub = typeof opt === "object" && opt.surcharge > 0 ? " +£" + opt.surcharge.toFixed(2) : "";
    const btn = document.createElement("button");
    btn.className = "opt-btn" + (selected === val ? " selected" : "");
    btn.textContent = val + sub;
    btn.addEventListener("click", () => onSelect(val));
    row.appendChild(btn);
  }
  div.appendChild(row);
  return div;
}

function makeNumericEntryPad() {
  const wrap = document.createElement("div");
  wrap.className = "num-input-wrap";

  const display = document.createElement("div");
  display.className = "num-display";
  display.textContent = "£" + (parseInt(customAmountBuffer) / 100).toFixed(2);
  wrap.appendChild(display);

  const grid = document.createElement("div");
  grid.className = "num-grid";

  const keys = ["1", "2", "3", "4", "5", "6", "7", "8", "9", "CLR", "0", "✕"];
  keys.forEach(k => {
    const btn = document.createElement("button");
    btn.className = "num-btn";
    btn.textContent = k;
    btn.type = "button";
    btn.addEventListener("click", () => handleNumPress(k, display));
    grid.appendChild(btn);
  });

  wrap.appendChild(grid);
  return wrap;
}

function handleNumPress(key, displayElement) {
  if (key === "CLR") {
    customAmountBuffer = "0";
  } else if (key === "✕") {
    if (customAmountBuffer.length > 1) {
      customAmountBuffer = customAmountBuffer.slice(0, -1);
    } else {
      customAmountBuffer = "0";
    }
  } else {
    if (customAmountBuffer === "0") {
      customAmountBuffer = key;
    } else if (customAmountBuffer.length < 7) {
      customAmountBuffer += key;
    }
  }
  
  const numericVal = parseInt(customAmountBuffer) / 100;
  modalItem.price = numericVal;
  displayElement.textContent = "£" + numericVal.toFixed(2);
  updateModalPrice();
}

function openCustomAmountModal() {
  customAmountBuffer = "0";
  modalItem = { name: "Custom Charge Item", price: 0, isCustom: true };
  modalOpts = {};
  renderModal();
  document.getElementById("opt-overlay").classList.add("show");
}

function updateModalPrice() {
  const p = calcPrice(modalItem, modalOpts);
  document.getElementById("opt-price").textContent = "£" + p.toFixed(2);
  document.getElementById("opt-add").textContent = "Add £" + p.toFixed(2);
}

function confirmAdd() {
  addLine(modalItem, modalItem.isCustom ? null : { 
    size: modalOpts.size, 
    bread: modalOpts.bread, 
    garnish: modalOpts.garnish, 
    milk: modalOpts.milk,
    cone: modalOpts.cone,
    flavour: modalOpts.flavour,
    flake: modalOpts.flake
  });
  closeModal();
}

function closeModal() {
  document.getElementById("opt-overlay").classList.remove("show");
}

function addLine(item, opts) {
  const price = calcPrice(item, opts);
  
  let displayName = item.name;
  if (item.askIceCreamFlavour && opts) {
    displayName = opts.flavour + " Scoop";
  } else if (item.askSupremeFlavour && opts) {
    displayName = opts.flavour + " Supreme";
  } else if (item.askSqueezeFlavour && opts) {
    displayName = opts.flavour + " Squeeze Up";
  }

  const key = lineKey(displayName, opts);
  const idx = lines.findIndex(l => l.key === key);
  
  let categorisedAsFood = false;
  if (item.isCustom) {
    categorisedAsFood = true; 
  } else {
    const isBreakfastItem = DATASETS.morning.breakfast.sections[0].items.some(i => i.name === item.name);
    const isLunchFood = DATASETS.lunch.food.sections.some(s => s.items.some(i => i.name === item.name));
    categorisedAsFood = isBreakfastItem || isLunchFood;
  }

  if (idx >= 0) {
    lines[idx].qty++;
  } else {
    lines.push({ 
  key, 
  name: displayName, 
  price, 
  qty: 1, 
  opts, 
  food: categorisedAsFood,
  note: ""
});
  }
  updateOrderBtn();
}

function removeLineAtIndex(index) {
  lines.splice(index, 1);
  updateOrderBtn();
  renderOrderSheet();
}

function updateLineQtyAtIndex(index, value) {
  const qty = parseInt(value);
  if (isNaN(qty) || qty < 0) return;
  if (qty === 0) {
    removeLineAtIndex(index);
    return;
  }
  lines[index].qty = qty;
  updateOrderBtn();
  renderOrderSheet();
}

function updateOrderBtn() {
  const btn = document.getElementById("order-btn");
  const label = document.getElementById("order-btn-label");
  const tot = document.getElementById("order-btn-total");
  
  let total = lines.reduce((s, l) => s + l.price * l.qty, 0);
  if (discountApplied) {
    total = total * 0.85; 
  }
  
  const count = lines.reduce((s, l) => s + l.qty, 0);
  if (lines.length > 0) {
    btn.classList.add("has-items");
    label.textContent = "VIEW ORDER (" + count + " items)";
    tot.textContent = "£" + total.toFixed(2);
  } else {
    btn.classList.remove("has-items");
    label.textContent = "VIEW ORDER";
    tot.textContent = "";
  }
}

function openOrder() {
  renderOrderSheet();
  document.getElementById("order-overlay").classList.add("show");
}

function closeOrder() {
  document.getElementById("order-overlay").classList.remove("show");
}

function clearAll() {
  lines = [];
  discountApplied = false;
  updateOrderBtn();
  closeOrder();
}

function setupDiscountHoldAction() {
  const btn = document.getElementById("discount-hold-action");

  const startHold = (e) => {
    if (discountApplied || lines.length === 0) return;
    btn.classList.add("holding");
    
    discountHoldTimer = setTimeout(() => {
      discountApplied = true;
      updateOrderBtn();
      renderOrderSheet();
      endHold();
    }, 1000); 
  };

  const endHold = () => {
    if (discountHoldTimer) clearTimeout(discountHoldTimer);
    btn.classList.remove("holding");
  };

  btn.addEventListener("mousedown", startHold);
  btn.addEventListener("mouseup", endHold);
  btn.addEventListener("mouseleave", endHold);

  btn.addEventListener("touchstart", (e) => { e.preventDefault(); startHold(e); }, { passive: false });
  btn.addEventListener("touchend", endHold);
  btn.addEventListener("touchcancel", endHold);
}

function removeDiscount() {
  discountApplied = false;
  updateOrderBtn();
  renderOrderSheet();
}

function renderOrderSheet() {
  const body = document.getElementById("order-body");
  const totalBar = document.getElementById("order-total-bar");
  const totalAmt = document.getElementById("order-total-amt");
  const discountRow = document.getElementById("discount-status-row");
  const holdDiscountBtn = document.getElementById("discount-hold-action");
  
  body.innerHTML = "";

  if (lines.length === 0) {
    body.innerHTML = "<div class='empty-msg'>Nothing added yet</div>";
    totalBar.style.display = "none";
    discountRow.style.display = "none";
    return;
  }

  const lineItemsWithIndex = lines.map((line, originalIndex) => ({ ...line, originalIndex }));
  const foodLines = lineItemsWithIndex.filter(l => l.food);
  const drinkLines = lineItemsWithIndex.filter(l => !l.food);

  if (foodLines.length > 0) {
    const title = document.createElement("div");
    title.className = "order-section-title";
    title.textContent = "FOOD ITEMS";
    body.appendChild(title);
    foodLines.forEach(l => body.appendChild(createLineRowElement(l, l.originalIndex)));
  }

  if (drinkLines.length > 0) {
    const title = document.createElement("div");
    title.className = "order-section-title";
    title.textContent = "BEVERAGES & SNACKS";
    body.appendChild(title);
    drinkLines.forEach(l => body.appendChild(createLineRowElement(l, l.originalIndex)));
  }

  let total = lines.reduce((s, l) => s + l.price * l.qty, 0);
  
  if (discountApplied) {
    total = total * 0.85; 
    discountRow.style.display = "flex";
    holdDiscountBtn.style.display = "none"; 
  } else {
    discountRow.style.display = "none";
    holdDiscountBtn.style.display = "block"; 
  }

  totalAmt.textContent = "£" + total.toFixed(2);
  totalBar.style.display = "flex";
}

function createLineRowElement(l, realIdx) {
  const div = document.createElement("div");
  div.className = "order-line";

  const remBtn = document.createElement("button");
  remBtn.className = "remove";
  remBtn.textContent = "✕";
  remBtn.addEventListener("click", () => removeLineAtIndex(realIdx));

  const textLabel = document.createElement("span");
  textLabel.className = "lname";
  textLabel.textContent = lineLabel(l.name, l.opts);
  if (l.note) {
  textLabel.innerHTML += "<br><small style='color:#ffcc66'>📝 " + l.note + "</small>";
}

  const numInput = document.createElement("input");
  numInput.type = "number";
  numInput.min = "0";
  numInput.value = l.qty;
  numInput.addEventListener("change", (e) => updateLineQtyAtIndex(realIdx, e.target.value));

  const noteBtn = document.createElement("button");
noteBtn.textContent = "NOTE";
noteBtn.style.background = "#666";
noteBtn.style.color = "#fff";
noteBtn.style.border = "none";
noteBtn.style.borderRadius = "4px";
noteBtn.style.padding = "4px 8px";
noteBtn.style.cursor = "pointer";

noteBtn.addEventListener("click", () => {
  const newNote = prompt("Chef note:", l.note || "");
  
  if (newNote !== null) {
    lines[realIdx].note = newNote;
    renderOrderSheet();
  }
});
  const priceLabel = document.createElement("span");
  priceLabel.className = "lprice";
  priceLabel.textContent = "£" + (l.price * l.qty).toFixed(2);

const editBtn = document.createElement("button");

editBtn.textContent = "EDIT";

editBtn.style.background = "#3b9eff";
editBtn.style.border = "none";
editBtn.style.color = "white";
editBtn.style.padding = "4px 8px";
editBtn.style.borderRadius = "4px";
editBtn.style.cursor = "pointer";

editBtn.addEventListener("click", () => {

  if (!l.opts) return;

  const milkChoice = prompt(
    "Milk? normal / none / soya / oat",
    l.opts.milk || "Normal Milk"
  );

  if (!milkChoice) return;

  if (milkChoice.toLowerCase() === "normal") {
    l.opts.milk = "Normal Milk";
  }

  if (milkChoice.toLowerCase() === "none") {
    l.opts.milk = "No Milk";
  }

  if (milkChoice.toLowerCase() === "soya") {
    l.opts.milk = "Soya Milk";
  }

  if (milkChoice.toLowerCase() === "oat") {
    l.opts.milk = "Oat Milk";
  }

  renderOrderSheet();

});

div.appendChild(remBtn);
div.appendChild(textLabel);
div.appendChild(editBtn);
div.appendChild(numInput);
div.appendChild(noteBtn);
div.appendChild(noteBtn);
div.appendChild(priceLabel);

  return div;
}

// Fire the program immediately on page build
async function sendOrderToKitchen() {

  if (lines.length === 0) {
    alert("No items in order");
    return;
  }

  const orderRows = lines.map(line => ({
    item_name: line.name,
    quantity: line.qty,
    price: line.price,
    category: line.food ? "food" : "drink",
    created_at: new Date().toISOString()
  }));

  const { data, error } = await supabaseClient
    .from('cafe_orders')
    .insert(orderRows);

  if (error) {
    console.error(error);
    alert("Failed to send order");
    return;
  }

  alert("Order sent to kitchen!");

  lines = [];
  discountApplied = false;

  updateOrderBtn();
  renderOrderSheet();
}
switchMainMenu("morning");
</script>
</body>
</html>
