<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>The Beach Shack Till</title>
<style>
  /* Base Layout & Mobile Overrides */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; color: #f0f0f0; font-family: system-ui, sans-serif; font-size: 14px; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
  button { font-family: inherit; user-select: none; -webkit-user-select: none; }

  /* Tier 1: Master Shift Selection Bar (Top Row) */
  .service-tier { display: flex; background: #000; border-bottom: 1px solid #222; flex-shrink: 0; padding: 6px; gap: 6px; }
  .service-btn { flex: 1; padding: 12px 0; border: none; border-radius: 4px; cursor: pointer; font-weight: 700; font-size: 11px; letter-spacing: 1px; background: #222; color: #666; text-transform: uppercase; }
  .service-btn.active { background: #1a3f6a; color: #3b9eff; border: 1px solid #3b9eff; }

  /* Tier 2: Category Filter Navigation Tabs (Second Row) */
  .tabs-container { display: flex; background: #111; flex-shrink: 0; position: relative; border-bottom: 2px solid #2e2e2e; }
  .tab-btn { flex: 1; padding: 14px 0; border: none; cursor: pointer; font-weight: 800; font-size: 14px; letter-spacing: 2px; background: transparent; color: #666; border-bottom: 3px solid transparent; }
  .tab-btn.active { background: #1e1e1e; color: #3b9eff; border-bottom: 3px solid #3b9eff; }

  /* Safety Overrides Strip Overlay */
  .lock-panel { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.95); display: none; align-items: center; justify-content: space-between; padding: 0 12px; z-index: 10; }
  .lock-panel.show { display: flex; }
  .lock-msg { font-size: 11px; font-weight: 700; color: #ff9900; letter-spacing: 0.5px; }
  .lock-actions { display: flex; gap: 6px; align-items: center; }
  .lock-cancel { background: #444; color: #fff; border: none; border-radius: 4px; padding: 6px 10px; font-weight: 700; cursor: pointer; font-size: 11px; }
  .lock-confirm { background: #222; color: #fff; border: 1px solid #ff9900; border-radius: 4px; padding: 6px 12px; font-weight: 800; cursor: pointer; font-size: 11px; position: relative; overflow: hidden; }
  .lock-progress { position: absolute; left: 0; top: 0; bottom: 0; background: rgba(255, 153, 0, 0.3); width: 0%; transition: width 0.1s linear; }

  /* Scrollable Workspace Windows */
  .scroll-container { flex: 1; overflow-y: auto; display: none; background: #111; padding: 10px; padding-bottom: 30px; }
  .scroll-container.active { display: block; }

  /* Clean Block Sections instead of Accordions */
  .menu-group-block { margin-bottom: 16px; }
  .group-header { font-size: 12px; font-weight: 800; color: #888; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; padding-left: 2px; }
  .items-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  
  /* Menu Grid Items Buttons */
  .item-btn { padding: 10px 4px; background: #222; border: 1px solid #333; border-radius: 6px; cursor: pointer; color: #f0f0f0; text-align: center; line-height: 1.3; font-size: 12px; min-height: 58px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
  .item-btn:active { background: #3b9eff; color: #fff; }
  .item-name { display: block; font-weight: 600; }
  .item-price { display: block; color: #3b9eff; font-weight: 700; margin-top: 3px; font-size: 12px; }
  .item-btn:active .item-price { color: #fff; }

  /* Bottom Order Bar Panel */
  #order-btn { width: 100%; flex-shrink: 0; padding: 16px 20px; border: none; cursor: pointer; background: #333; color: #fff; font-weight: 800; font-size: 16px; display: flex; justify-content: space-between; align-items: center; }
  #order-btn.has-items { background: #3b9eff; }

  /* Modal Windows Drawers */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 50; display: none; align-items: flex-end; }
  .overlay.show { display: flex; }
  .sheet { background: #1e1e1e; width: 100%; max-height: 85vh; display: flex; flex-direction: column; border-radius: 14px 14px 0 0; }
  .sheet-head { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 1px solid #2e2e2e; flex-shrink: 0; }
  .sheet-head span { font-weight: 800; font-size: 16px; }
  .sheet-btns { display: flex; gap: 10px; }
  .btn-clear { background: #cc3333; color: #fff; border: none; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-weight: 700; font-size: 13px; }
  .btn-close { background: #444; color: #fff; border: none; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-weight: 700; font-size: 13px; }
  .sheet-body { overflow-y: auto; flex: 1; padding: 0 14px; }

  .order-line { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid #2e2e2e; }
  .order-line .remove { background: none; border: none; color: #cc3333; cursor: pointer; font-size: 16px; padding: 0 4px; flex-shrink: 0; }
  .order-line .lname { flex: 1; font-size: 14px; line-height: 1.3; }
  .order-line .lprice { min-width: 60px; text-align: right; color: #3b9eff; font-weight: 700; font-size: 14px; }
  .empty-msg { color: #555; text-align: center; padding: 40px 0; }

  .sheet-total { padding: 14px 16px; background: #000; border-top: 2px solid #2e2e2e; display: flex; justify-content: space-between; align-items: baseline; flex-shrink: 0; }
  .sheet-total span:first-child { color: #666; font-size: 13px; font-weight: 700; letter-spacing: 2px; }
  .sheet-total span:last-child { font-size: 36px; font-weight: 900; color: #3b9eff; }

  /* Options Input Configurations Modal Frame */
  #opt-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 99; display: none; align-items: center; justify-content: center; padding: 20px; }
  #opt-overlay.show { display: flex; }
  #opt-box { background: #1e1e1e; border-radius: 10px; padding: 20px; width: 100%; max-width: 320px; border: 1px solid #2e2e2e; }
  #opt-title { font-weight: 800; font-size: 15px; margin-bottom: 2px; }
  #opt-price { color: #3b9eff; font-weight: 700; font-size: 20px; margin-bottom: 16px; }
  .opt-group { margin-bottom: 14px; }
  .opt-label { font-size: 11px; color: #666; letter-spacing: 1px; margin-bottom: 8px; }
  .opt-row { display: flex; gap: 8px; }
  .opt-btn { flex: 1; padding: 10px 4px; border-radius: 6px; border: none; cursor: pointer; font-weight: 700; font-size: 12px; background: #333; color: #fff; line-height: 1.4; }
  .opt-btn.selected { background: #3b9eff; }
  .opt-actions { display: flex; gap: 8px; margin-top: 18px; }
  #opt-cancel { flex: 1; padding: 11px 0; background: #333; color: #f0f0f0; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; }
  #opt-add { flex: 2; padding: 11px 0; background: #3b9eff; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: 800; font-size: 15px; }
</style>
</head>
<body>

<div class="service-tier">
  <button class="service-btn" id="srv-btn-morning" onclick="trySwitchService('morning')">Morning Shift (10am-11:45am)</button>
  <button class="service-btn" id="srv-btn-main" onclick="trySwitchService('main')">Main Menu Shift</button>
</div>

<div class="tabs-container">
  <button class="tab-btn" id="tab-btn-food" onclick="switchCategoryTab('food')">FOOD</button>
  <button class="tab-btn" id="tab-btn-drinks" onclick="switchCategoryTab('drinks')">DRINKS</button>

  <div class="lock-panel" id="lock-strip">
    <span class="lock-msg" id="lock-banner-text">OVERRIDE ACTIVE SHIFT TIME?</span>
    <div class="lock-actions">
      <button class="lock-cancel" onclick="cancelServiceSwitch()">CANCEL</button>
      <button class="lock-confirm" id="lock-confirm-btn">
        <div class="lock-progress" id="lock-progress-bar"></div>
        <span style="position: relative; z-index: 2;">HOLD TO UNLOCK</span>
      </button>
    </div>
  </div>
</div>

<div class="scroll-container" id="food-scroll"></div>
<div class="scroll-container" id="drinks-scroll"></div>

<button id="order-btn" onclick="openOrder()">
  <span id="order-btn-label">VIEW ORDER</span>
  <span id="order-btn-total"></span>
</button>

<div class="overlay" id="order-overlay">
  <div class="sheet">
    <div class="sheet-head">
      <span>ORDER</span>
      <div class="sheet-btns">
        <button class="btn-clear" onclick="clearAll()">CLEAR</button>
        <button class="btn-close" onclick="closeOrder()">CLOSE</button>
      </div>
    </div>
    <div class="sheet-body" id="order-body"></div>
    <div class="sheet-total" id="order-total-bar" style="display:none">
      <span>TOTAL</span>
      <span id="order-total-amt"></span>
    </div>
  </div>
</div>

<div id="opt-overlay">
  <div id="opt-box">
    <div id="opt-title"></div>
    <div id="opt-price"></div>
    <div id="opt-groups"></div>
    <div class="opt-actions">
      <button id="opt-cancel" onclick="closeModal()">Cancel</button>
      <button id="opt-add" onclick="confirmAdd()">Add</button>
    </div>
  </div>
</div>

<script>
// Flattened Databank Matching Image Specifications Perfectly
const MENU = {
  morning: {
    food: [
      { label: "Morning Menu Items", items: [
        { name: "Fruited Tea Cake", price: 2.45 },
        { name: "Crumpets", price: 2.45 },
        { name: "Bacon Sandwich", price: 6.30 },
        { name: "Croissant & Butter", price: 3.60 },
        { name: "Toast & Butter", price: 2.45 }
      ]}
    ],
    drinks: [
      { label: "Hot Drinks", items: [
        { name: "Americano", price: 3.60 }, { name: "Cafe Latte", price: 3.80 },
        { name: "Macchiato", price: 3.80 }, { name: "Cappuccino", price: 3.80 },
        { name: "Flat White", price: 3.80 }, { name: "Mocha", price: 4.15 },
        { name: "Espresso", price: 2.50 }, { name: "Instant Decaf Coffee", price: 2.40 },
        { name: "Extra Shot", price: 1.25 }, { name: "Flavoured Syrup", price: 1.00 }, 
        { name: "Regular Tea - Mug", price: 2.95 }, { name: "Regular Tea - Pot", price: 4.00 }, 
        { name: "Earl Grey - Mug", price: 3.00 }, { name: "Earl Grey - Pot", price: 4.10 }, 
        { name: "Fruit Tea - Mug", price: 3.00 }, { name: "Fruit Tea - Pot", price: 4.10 }, 
        { name: "Hot Chocolate", price: 3.95 }, { name: "Hot Choc + Cream/Marsh", price: 4.20 },
        { name: "Bovril", price: 3.20 }
      ]}
    ]
  },
  main: {
    food: [
      { label: "Soups & Salads", items: [
        { name: "Soup of the Day", price: 9.50 }, { name: "Crab Soup", price: 10.75 },
        { name: "Crab Salad", prices: { Small: 21.95, Large: 28.95 }, askSize: true },
        { name: "Caesar Salad", prices: { Small: 14.95, Large: 21.95 }, askSize: true },
        { name: "Cheddar Salad", prices: { Small: 14.95, Large: 20.25 }, askSize: true },
        { name: "Prawn Cocktail", prices: { Small: 21.75, Large: 26.45 }, askSize: true },

      { label: "Sandwiches", items: [

        { name: "Prawns", price: 11.75, askBread: true },
        { name: "Tuna Mayo", price: 9.95, askBread: true },
        { name: "Egg Mayo", price: 8.95, askBread: true },
        { name: "Chicken", price: 9.95, askBread: true },
        { name: "Ham", price: 9.95, askBread: true },
        { name: "Cheddar Cheese", price: 8.45, askBread: true },
        { name: "Salad Sandwich", price: 8.45, askBread: true }
      ]}
    ],
    drinks: [
      { label: "Hot & Cold Drinks", items: [
        { name: "Americano", price: 3.60 }, { name: "Cafe Latte", price: 3.80 },
        { name: "Macchiato", price: 3.80 }, { name: "Cappuccino", price: 3.80 },
        { name: "Flat White", price: 3.80 }, { name: "Mocha", price: 4.15 },
        { name: "Espresso", price: 2.50 }, { name: "Instant Decaf Coffee", price: 2.40 },
        { name: "Regular Tea - Mug", price: 2.95 }, { name: "Regular Tea - Pot", price: 4.00 },
        { name: "Earl Grey - Mug", price: 3.00 }, { name: "Earl Grey - Pot", price: 4.10 },
        { name: "Fruit Tea - Mug", price: 3.00 }, { name: "Fruit Tea - Pot", price: 4.10 },
        { name: "Bovril", price: 3.20 }, { name: "Hot Chocolate", price: 3.95 }, 
        { name: "Hot Choc + Cream/Marsh", price: 4.20 }, { name: "OJ / Apple Juice", price: 1.70 }, 
        { name: "Ribena", price: 1.90 }, { name: "Soft Drink Can", price: 3.00 }, 
        { name: "Elderflower Presse", price: 3.75 }, { name: "Raspberry Lemonade", price: 3.75 }, 
        { name: "Mineral Water", price: 1.90 }
      ]},
      { label: "Alcohol", items: [
        { name: "Carling", price: 5.00 }, { name: "Estrella", price: 5.25 },
        { name: "Planet Lager", price: 6.50 }, { name: "Wight Gold Ale", price: 6.50 },
        { name: "Fuggle Dee Dum", price: 6.50 }, { name: "Cider", price: 6.50 }
      ]},
      { label: "Handmade Goodies & Snacks", items: [
        { name: "Carrot Cake", price: 4.10 }, { name: "Caramel Shortcake", price: 3.65 },
        { name: "Flapjack (GF)", price: 2.95 }, { name: "Rock Cake", price: 2.95 },
        { name: "Choc Brownie", price: 3.65 }, { name: "Lemon Drizzle (GF)", price: 3.25 },
        { name: "Bread Pudding", price: 2.95 }, { name: "Caramel Nut Slice", price: 3.65 },
        { name: "Cream Tea", price: 7.95 }, { name: "Crisps", price: 1.80 }
      ]}
    ]
  }
};

const BREAD = [{ label: "White", surcharge: 0 }, { label: "Brown Seeded", surcharge: 0 }, { label: "Baguette", surcharge: 1.80 }];
const GARNISH = ["Crisps", "Salad Garnish"];
const SIZES = ["Small", "Large"];

// App State Core Parameters
let currentServiceMode = "main"; 
let currentCategoryTab = "food"; 
let lines = [];
let modalItem = null;
let modalOpts = {};

// Hold-to-Switch Parameters Engine
let pendingServiceTarget = null;
let holdTimer = null;
const HOLD_DURATION = 1000; 

function calculateDefaultServiceShift() {
  const now = new Date();
  const mins = (now.getHours() * 60) + now.getMinutes();
  return mins < 705 ? "morning" : "main"; 
}

function trySwitchService(targetMode) {
  if (currentServiceMode === targetMode) return;
  pendingServiceTarget = targetMode;
  document.getElementById("lock-banner-text").textContent = "SWITCH SHIFT MODE TO " + targetMode.toUpperCase() + "?";
  document.getElementById("lock-strip").classList.add("show");
}

function cancelServiceSwitch() {
  resetHoldState();
  document.getElementById("lock-strip").classList.remove("show");
  pendingServiceTarget = null;
}

function executeServiceSwitch(targetMode) {
  currentServiceMode = targetMode;
  document.getElementById("srv-btn-morning").classList.toggle("active", targetMode === "morning");
  document.getElementById("srv-btn-main").classList.toggle("active", targetMode === "main");
  cancelServiceSwitch();
  renderCurrentItemsView();
}

function switchCategoryTab(category) {
  currentCategoryTab = category;
  document.getElementById("tab-btn-food").classList.toggle("active", category === "food");
  document.getElementById("tab-btn-drinks").classList.toggle("active", category === "drinks");
  document.getElementById("food-scroll").classList.toggle("active", category === "food");
  document.getElementById("drinks-scroll").classList.toggle("active", category === "drinks");
  renderCurrentItemsView();
}

// Bind Touch/Mouse Hold to Safety Strip
const confirmBtn = document.getElementById("lock-confirm-btn");
confirmBtn.addEventListener("mousedown", startHold);
confirmBtn.addEventListener("touchstart", startHold);
window.addEventListener("mouseup", stopHold);
window.addEventListener("touchend", stopHold);

function startHold(e) {
  e.preventDefault();
  if (!pendingServiceTarget) return;
  document.getElementById("lock-progress-bar").style.transition = "width " + HOLD_DURATION + "ms linear";
  document.getElementById("lock-progress-bar").style.width = "100%";
  holdTimer = setTimeout(() => { executeServiceSwitch(pendingServiceTarget); }, HOLD_DURATION);
}

function stopHold() { if (holdTimer) { clearTimeout(holdTimer); resetHoldState(); } }
function resetHoldState() {
  holdTimer = null;
  const bar = document.getElementById("lock-progress-bar");
  bar.style.transition = "none";
  bar.style.width = "0%";
}

// Clear Output Generation Logic Frame
function renderCurrentItemsView() {
  renderColumn("food", document.getElementById("food-scroll"));
  renderColumn("drinks", document.getElementById("drinks-scroll"));
}

function renderColumn(category, container) {
  container.innerHTML = "";
  const groupsList = MENU[currentServiceMode][category] || [];
  
  groupsList.forEach(group => {
    const block = document.createElement("div");
    block.className = "menu-group-block";
    block.innerHTML = "<div class='group-header'>" + group.label + "</div>";
    
    const grid = document.createElement("div");
    grid.className = "items-grid";
    
    group.items.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "item-btn";
      const priceStr = item.askSize
        ? "£" + item.prices.Small.toFixed(2) + "–£" + item.prices.Large.toFixed(2)
        : "£" + item.price.toFixed(2);
      btn.innerHTML = "<span class='item-name'>" + item.name + "</span><span class='item-price'>" + priceStr + "</span>";
      btn.onclick = () => tapItem(item);
      grid.appendChild(btn);
    });
    
    block.appendChild(grid);
    container.appendChild(block);
  });
}

function tapItem(item) {
  if (item.askSize || item.askBread || item.askGarnish) {
    modalItem = item;
    modalOpts = {
      size: item.askSize ? SIZES[0] : null,
      bread: item.askBread ? BREAD[0].label : null,
      garnish: item.askGarnish ? GARNISH[0] : null,
    };
    renderModal();
    document.getElementById("opt-overlay").classList.add("show");
  } else {
    addLine(item, null);
  }
}

function renderModal() {
  document.getElementById("opt-title").textContent = modalItem.name;
  updateModalPrice();
  const groups = document.getElementById("opt-groups");
  groups.innerHTML = "";

  if (modalItem.askSize) groups.appendChild(makeOptGroup("SIZE", SIZES.map(s => ({ label: s, surcharge: 0 })), modalOpts.size, s => { modalOpts.size = s; renderModal(); }));
  if (modalItem.askBread) groups.appendChild(makeOptGroup("BREAD", BREAD, modalOpts.bread, b => { modalOpts.bread = b; renderModal(); }));
  if (modalItem.askGarnish) groups.appendChild(makeOptGroup("SERVED WITH", GARNISH.map(g => ({ label: g, surcharge: 0 })), modalOpts.garnish, g => { modalOpts.garnish = g; renderModal(); }));
}

function makeOptGroup(label, options, selected, onSelect) {
  const div = document.createElement("div");
  div.className = "opt-group";
  div.innerHTML = "<div class='opt-label'>" + label + "</div>";
  const row = document.createElement("div");
  row.className = "opt-row";
  for (const opt of options) {
    const val = typeof opt === "object" ? opt.label : opt;
    const sub = typeof opt === "object" && opt.surcharge > 0 ? " +£" + opt.surcharge.toFixed(2) : "";
    const btn = document.createElement("button");
    btn.className = "opt-btn" + (selected === val ? " selected" : "");
    btn.textContent = val + sub;
    btn.onclick = () => onSelect(val);
    row.appendChild(btn);
  }
  div.appendChild(row);
  return div;
}

function updateModalPrice() {
  const p = calcPrice(modalItem, modalOpts);
  document.getElementById("opt-price").textContent = "£" + p.toFixed(2);
  document.getElementById("opt-add").textContent = "Add £" + p.toFixed(2);
}

function confirmAdd() {
  addLine(modalItem, { size: modalOpts.size, bread: modalOpts.bread, garnish: modalOpts.garnish });
  closeModal();
}

function closeModal() { document.getElementById("opt-overlay").classList.remove("show"); }

function calcPrice(item, opts) {
  const base = item.askSize ? item.pri
