    z-index: 1;

function setupHoldToSwitchButton(elementId, menuKey) {
  const btn = document.getElementById(elementId);

  const startHold = (e) => {
    if (activeMainMenu === menuKey) return;
    holdTargetMenu = menuKey;
    btn.classList.add("holding");
    
    holdTimer = setTimeout(() => {
      switchMainMenu(menuKey);
      endHold();
    }, 500);
  };

  const endHold = () => {
    if (holdTimer) clearTimeout(holdTimer);
    btn.classList.remove("holding");
    holdTargetMenu = null;
  };

  btn.addEventListener("mousedown", startHold);
  btn.addEventListener("mouseup", endHold);
  btn.addEventListener("mouseleave", endHold);

  btn.addEventListener("touchstart", (e) => { e.preventDefault(); startHold(e); }, { passive: false });
  btn.addEventListener("touchend", endHold);
  btn.addEventListener("touchcancel", endHold);
}

function calcPrice(item, opts) {

  if (item.isCustom) return item.price;

  if (item.askWineSize) {
    return item.winePrices[opts.wineSize];
  }

  if (item.askCoffeeType) {
    const base = item.basePrices[opts.coffeeType];

    const milk =
      opts.milk
        ? MILKS.find(m => m.label === opts.milk)
        : null;

    return base + (milk ? milk.surcharge : 0);
  }

  if (item.askWaterType) {
  return item.basePrices[opts.waterType];
}
  
  if (item.askTeaType) {
    return item.basePrices[opts.teaType];
  }

  if (item.askHotChocolateType) {
    return item.basePrices[opts.hotChocolateType];
  }


  if (item.askIceCreamFlavour && opts) {

    const selectedCone =
      CONE_TYPES.find(c => c.label === opts.cone);

    const selectedFlake =
      FLAKE_OPTIONS.find(f => f.label === opts.flake);

    const base =
      selectedCone
        ? selectedCone.basePrice
        : 3.25;

    const extra =
      selectedFlake
        ? selectedFlake.surcharge
        : 0;

    return base + extra;
  }

  if (item.askSize) {
    return item.prices[
      (opts && opts.size) || "Small"
    ];
  }

  const base = item.price || 0;

  const bread =
    opts && opts.bread
      ? BREAD.find(b => b.label === opts.bread)
      : null;

  const milk =
    opts && opts.milk
      ? MILKS.find(m => m.label === opts.milk)
      : null;

  return base +
    (bread ? bread.surcharge : 0) +
    (milk ? milk.surcharge : 0);
}

function makeOptGroup(label, options, selected, onSelect) {
  const div = document.createElement("div");
  div.className = "opt-group";
  div.innerHTML = "<div class='opt-label'>" + label + "</div>";
  const row = document.createElement("div");
  row.className = "opt-row";
  for(const opt of options) {
    const val = typeof opt === "object" ? opt.label : opt;
    const sub = typeof opt === "object" && opt.surcharge > 0 ? " +£" + opt.surcharge.toFixed(2) : "";
    const btn = document.createElement("button");
    btn.className = "opt-btn" + (selected === val ? " selected" : "");
    btn.textContent = val + sub;
    btn.addEventListener("click", () => onSelect(val));
    row.appendChild(btn);
  }
  div.appendChild(row);
  return div;
}

function makeNumericEntryPad() {
  const wrap = document.createElement("div");
  wrap.className = "num-input-wrap";

  const display = document.createElement("div");
  display.className = "num-display";
  display.textContent = "£" + (parseInt(customAmountBuffer) / 100).toFixed(2);
  wrap.appendChild(display);

  const grid = document.createElement("div");
  grid.className = "num-grid";

  const keys = ["1", "2", "3", "4", "5", "6", "7", "8", "9", "CLR", "0", "✕"];
  keys.forEach(k => {
    const btn = document.createElement("button");
    btn.className = "num-btn";
    btn.textContent = k;
    btn.type = "button";
    btn.addEventListener("click", () => handleNumPress(k, display));
    grid.appendChild(btn);
  });

  wrap.appendChild(grid);
  return wrap;
}

function handleNumPress(key, displayElement) {
  if (key === "CLR") {
    customAmountBuffer = "0";
  } else if (key === "✕") {
    if (customAmountBuffer.length > 1) {
      customAmountBuffer = customAmountBuffer.slice(0, -1);
    } else {
      customAmountBuffer = "0";
    }
  } else {
    if (customAmountBuffer === "0") {
      customAmountBuffer = key;
    } else if (customAmountBuffer.length < 7) {
      customAmountBuffer += key;
    }
  }
  
  const numericVal = parseInt(customAmountBuffer) / 100;
  modalItem.price = numericVal;
  displayElement.textContent = "£" + numericVal.toFixed(2);
  updateModalPrice();
}

function openCustomAmountModal() {
  customAmountBuffer = "0";
  modalItem = { name: "Custom Charge Item", price: 0, isCustom: true };
  modalOpts = {};
  renderModal();
  document.getElementById("opt-add").disabled = true;
  document.getElementById("opt-overlay").classList.add("show");

  const p = calcPrice(modalItem, modalOpts);

          hotChocolateType: modalOpts.hotChocolateType,
          beerType: modalOpts.beerType,
          size: modalOpts.size,
          bread: modalOpts.bread,
          garnish: modalOpts.garnish,
          sauce: modalOpts.sauce,
          milk: modalOpts.milk,
          waterType: modalOpts.waterType,
          cone: modalOpts.cone,
          flavour: modalOpts.flavour,
          flake: modalOpts.flake
        }
  );

  closeModal();
}
  
function closeModal() {
  document.getElementById("opt-overlay").classList.remove("show");
}

function addLine(item, opts) {
  const price = calcPrice(item, opts);
  
  let displayName = item.name;
  if (item.askIceCreamFlavour && opts) {
    displayName = opts.flavour + " Scoop";
  } else if (item.askSupremeFlavour && opts) {
    displayName = opts.flavour + " Supreme";
  } else if (item.askSqueezeFlavour && opts) {
    displayName = opts.flavour + " Squeeze Up";
  }

  const key = lineKey(displayName, opts);
  const idx = lines.findIndex(l => l.key === key);
  
  let categorisedAsFood = false;
  if (item.isCustom) {
    categorisedAsFood = true; 
  } else {
    const isBreakfastItem = DATASETS.morning.breakfast.sections[0].items.some(i => i.name === item.name);
    const isLunchFood = DATASETS.lunch.food.sections.some(s => s.items.some(i => i.name === item.name));
    categorisedAsFood = isBreakfastItem || isLunchFood;
  }

  if (idx >= 0) {
    lines[idx].qty++;
  } else {
    lines.push({ 
  key, 
  name: displayName, 
  price, 
  qty: 1, 
  opts, 
  food: categorisedAsFood,
  note: ""
});
  }
  updateOrderBtn();
}

function removeLineAtIndex(index) {
  lines.splice(index, 1);
  updateOrderBtn();
  renderOrderSheet();
}

  function lineKey(name, opts) {
  return name + JSON.stringify(opts || {});
}
  
function updateLineQtyAtIndex(index, value) {
  const qty = parseInt(value);
  if (isNaN(qty) || qty < 0) return;
  if (qty === 0) {
    removeLineAtIndex(index);
    return;
  }
  lines[index].qty = qty;
  updateOrderBtn();
  renderOrderSheet();
}

function updateOrderBtn() {
  const btn = document.getElementById("order-btn");
  const label = document.getElementById("order-btn-label");
  const tot = document.getElementById("order-btn-total");
  
  let total = lines.reduce((s, l) => s + l.price * l.qty, 0);
  if (discountApplied) {
    total = total * 0.85; 
  }
  
  const count = lines.reduce((s, l) => s + l.qty, 0);
  if (lines.length > 0) {
    btn.classList.add("has-items");
    label.textContent = "VIEW ORDER (" + count + " items)";
    tot.textContent = "£" + total.toFixed(2);
  } else {
    btn.classList.remove("has-items");
    label.textContent = "VIEW ORDER";
    tot.textContent = "";
  }
}

function openOrder() {
  renderOrderSheet();
  document.getElementById("order-overlay").classList.add("show");
}

function closeOrder() {
  document.getElementById("order-overlay").classList.remove("show");
}

function clearAll() {
  lines = [];
  discountApplied = false;
  updateOrderBtn();
  closeOrder();
}

function setupDiscountHoldAction() {
  const btn = document.getElementById("discount-hold-action");

  const startHold = (e) => {
    if (discountApplied || lines.length === 0) return;
    btn.classList.add("holding");
    
    discountHoldTimer = setTimeout(() => {
      discountApplied = true;
      updateOrderBtn();
      renderOrderSheet();
      endHold();
    }, 1000); 
  };

  const endHold = () => {
    if (discountHoldTimer) clearTimeout(discountHoldTimer);
    btn.classList.remove("holding");
  };

  btn.addEventListener("mousedown", startHold);
  btn.addEventListener("mouseup", endHold);
  btn.addEventListener("mouseleave", endHold);

  btn.addEventListener("touchstart", (e) => { e.preventDefault(); startHold(e); }, { passive: false });
  btn.addEventListener("touchend", endHold);
  btn.addEventListener("touchcancel", endHold);
}

function removeDiscount() {
  discountApplied = false;
  updateOrderBtn();
  renderOrderSheet();
}

function renderOrderSheet() {
  const body = document.getElementById("order-body");
  const totalBar = document.getElementById("order-total-bar");
  const totalAmt = document.getElementById("order-total-amt");
  const discountRow = document.getElementById("discount-status-row");
  const holdDiscountBtn = document.getElementById("discount-hold-action");
  
  body.innerHTML = "";

  if (lines.length === 0) {
    body.innerHTML = "<div class='empty-msg'>Nothing added yet</div>";
    totalBar.style.display = "none";
    discountRow.style.display = "none";
    return;
  }

  const lineItemsWithIndex = lines.map((line, originalIndex) => ({ ...line, originalIndex }));
  const foodLines = lineItemsWithIndex.filter(l => l.food);
  const drinkLines = lineItemsWithIndex.filter(l => !l.food);

  if (foodLines.length > 0) {
    const title = document.createElement("div");
    title.className = "order-section-title";
    title.textContent = "FOOD ITEMS";
    body.appendChild(title);
    foodLines.forEach(l => body.appendChild(createLineRowElement(l, l.originalIndex)));
  }

  if (drinkLines.length > 0) {
    const title = document.createElement("div");
    title.className = "order-section-title";
    title.textContent = "BEVERAGES & SNACKS";
    body.appendChild(title);
    drinkLines.forEach(l => body.appendChild(createLineRowElement(l, l.originalIndex)));
  }

  let total = lines.reduce((s, l) => s + l.price * l.qty, 0);
  
  if (discountApplied) {
    total = total * 0.85; 
    discountRow.style.display = "flex";
    holdDiscountBtn.style.display = "none"; 
  } else {
    discountRow.style.display = "none";
    holdDiscountBtn.style.display = "block"; 
  }

  totalAmt.textContent = "£" + total.toFixed(2);
  totalBar.style.display = "flex";
}

function createLineRowElement(l, realIdx) {
  const div = document.createElement("div");
  div.className = "order-line";

  const remBtn = document.createElement("button");
  remBtn.className = "remove";
  remBtn.textContent = "✕";
  remBtn.addEventListener("click", () => removeLineAtIndex(realIdx));

  const textLabel = document.createElement("span");
  textLabel.className = "lname";
  textLabel.textContent = lineLabel(l.name, l.opts);
  if (l.note) {
  textLabel.innerHTML += "<br><small style='color:#ffcc66'>📝 " + l.note + "</small>";
}

  const numInput = document.createElement("input");
  numInput.type = "number";
  numInput.min = "0";
  numInput.value = l.qty;
  numInput.addEventListener("change", (e) => updateLineQtyAtIndex(realIdx, e.target.value));

  const noteBtn = document.createElement("button");
noteBtn.textContent = "NOTE";
noteBtn.style.background = "#666";
noteBtn.style.color = "#fff";
noteBtn.style.border = "none";
noteBtn.style.borderRadius = "4px";
noteBtn.style.padding = "4px 8px";
noteBtn.style.cursor = "pointer";

noteBtn.addEventListener("click", () => {
  const newNote = prompt("Chef note:", l.note || "");
  
  if (newNote !== null) {
    lines[realIdx].note = newNote;
    renderOrderSheet();
  }
});
  const priceLabel = document.createElement("span");
  priceLabel.className = "lprice";
  priceLabel.textContent = "£" + (l.price * l.qty).toFixed(2);

const editBtn = document.createElement("button");

editBtn.textContent = "EDIT";

editBtn.style.background = "#3b9eff";
editBtn.style.border = "none";
editBtn.style.color = "white";
editBtn.style.padding = "4px 8px";
editBtn.style.borderRadius = "4px";
editBtn.style.cursor = "pointer";

editBtn.addEventListener("click", () => {

  // find original menu item definition
  let sourceItem = null;

  for (const menuKey in DATASETS) {

    const menu = DATASETS[menuKey];

    for (const tabKey of menu.tabs) {

      const tab = menu[tabKey];

      for (const section of tab.sections) {

       const found = section.items.find(i =>
  l.name === i.name ||
  l.name.startsWith(i.name)
);

        if (found) {
          sourceItem = found;
          break;
        }

      }

    }

  }

  if (!sourceItem) {
    alert("Cannot edit this item");
    return;
  }

  modalItem = sourceItem;

  // clone current options
  modalOpts = {
    wineSize: l.opts?.wineSize || null,
    coffeeType: l.opts?.coffeeType || null,
    teaType: l.opts?.teaType || null,
    hotChocolateType: l.opts?.hotChocolateType || null,
    beerType: l.opts?.beerType || null,
    size: l.opts?.size || null,
    bread: l.opts?.bread || null,
    garnish: l.opts?.garnish || null,
    sauce: l.opts?.sauce || null,
    milk: l.opts?.milk || null,
    waterType: l.opts?.waterType || null,
    cone: l.opts?.cone || null,
    flavour: l.opts?.flavour || null,
    flake: l.opts?.flake || null
  };

  renderModal();

  document.getElementById("opt-overlay").classList.add("show");

  // override add button temporarily
  const addBtn = document.getElementById("opt-add");

  addBtn.onclick = () => {

    lines[realIdx].opts = { ...modalOpts };

lines[realIdx].price =
  calcPrice(modalItem, modalOpts);

lines[realIdx].key =
  lineKey(lines[realIdx].name, modalOpts);

    closeModal();

    renderOrderSheet();

    updateOrderBtn();

    // restore normal button behaviour
    addBtn.onclick = confirmAdd;
  };

});

div.appendChild(remBtn);
div.appendChild(textLabel);
if (l.opts) {
  div.appendChild(editBtn);
}
div.appendChild(numInput);
div.appendChild(noteBtn);
div.appendChild(priceLabel);

  return div;
}

}

switchMainMenu("morning");
