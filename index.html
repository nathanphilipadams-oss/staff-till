<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Beach Shack Till</title>
<style>
  /* Global Layout Styles */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; color: #f0f0f0; font-family: system-ui, sans-serif; font-size: 14px; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
  button { font-family: inherit; }

  /* Main Menu Toggle Bar (Morning vs Lunch) */
  .menu-toggle-container { display: flex; background: #1a1a1a; border-bottom: 2px solid #2e2e2e; flex-shrink: 0; }
  .menu-toggle-btn { flex: 1; padding: 14px 0; border: none; cursor: pointer; font-weight: 900; font-size: 14px; letter-spacing: 2px; background: transparent; color: #888; text-align: center; }
  .menu-toggle-btn.active { background: #262626; color: #ff9f43; border-bottom: 3px solid #ff9f43; }
  #menu-toggle-lunch.active { color: #20bf6b; border-bottom: 3px solid #20bf6b; }

  /* Sub Navigation Tabs */
  .tabs-container { display: flex; background: #000; flex-shrink: 0; }
  .tab-btn { flex: 1; padding: 13px 0; border: none; cursor: pointer; font-weight: 800; font-size: 13px; letter-spacing: 2px; background: transparent; color: #666; border-bottom: 3px solid transparent; text-align: center; }
  .tab-btn.active { background: #1e1e1e; color: #3b9eff; border-bottom: 3px solid #3b9eff; }

  /* Main Scrollable Content Area */
  .scroll-container { flex: 1; overflow-y: auto; background: #111; padding-bottom: 20px; }

  /* Accordion Design */
  .acc-btn { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; border: none; cursor: pointer; background: #1e1e1e; border-bottom: 1px solid #2e2e2e; color: #fff; font-weight: 700; font-size: 13px; letter-spacing: 1px; }
  .acc-btn.open { background: #1a3f6a; }
  .acc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 6px; background: #161616; border-bottom: 1px solid #2e2e2e; }
  
  /* Menu Item Grid Buttons */
  .item-btn { padding: 10px 5px; background: #1e1e1e; border: 1px solid #2e2e2e; border-radius: 6px; cursor: pointer; color: #f0f0f0; text-align: center; line-height: 1.3; font-size: 12px; }
  .item-name { display: block; font-weight: 600; }
  .item-price { display: block; color: #3b9eff; font-weight: 700; margin-top: 3px; font-size: 13px; }

  /* Bottom Sticky View Order Panel Bar */
  #order-btn { flex-shrink: 0; padding: 16px 20px; border: none; cursor: pointer; background: #333; color: #fff; font-weight: 800; font-size: 16px; display: flex; justify-content: space-between; align-items: center; }
  #order-btn.has-items { background: #3b9eff; }

  /* Popover Slide Up Receipt Drawers */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 50; display: none; align-items: flex-end; }
  .overlay.show { display: flex; }
  .sheet { background: #1e1e1e; width: 100%; max-height: 85vh; display: flex; flex-direction: column; border-radius: 14px 14px 0 0; }
  .sheet-head { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 1px solid #2e2e2e; flex-shrink: 0; }
  .sheet-head span { font-weight: 800; font-size: 16px; }
  .sheet-btns { display: flex; gap: 10px; }
  .btn-clear { background: #cc3333; color: #fff; border: none; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-weight: 700; font-size: 13px; }
  .btn-close { background: #444; color: #fff; border: none; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-weight: 700; font-size: 13px; }
  .sheet-body { overflow-y: auto; flex: 1; padding: 0 14px; }

  /* Breakdown Receipt Lines layout elements */
  .order-section-title { font-size: 11px; font-weight: 800; letter-spacing: 2px; color: #888; padding: 10px 0 4px; }
  .order-line { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #2e2e2e; }
  .order-line .remove { background: none; border: none; color: #cc3333; cursor: pointer; font-size: 16px; padding: 0; flex-shrink: 0; }
  .order-line .lname { flex: 1; font-size: 14px; line-height: 1.3; }
  .order-line input { width: 38px; text-align: center; background: #2a2a2a; border: 1px solid #2e2e2e; border-radius: 4px; color: #fff; padding: 4px 0; font-size: 14px; }
  .order-line .lprice { min-width: 52px; text-align: right; color: #3b9eff; font-weight: 700; font-size: 14px; }
  .empty-msg { color: #555; text-align: center; padding: 40px 0; }

  .sheet-total { padding: 14px 16px; background: #000; border-top: 2px solid #2e2e2e; display: flex; justify-content: space-between; align-items: baseline; flex-shrink: 0; }
  .sheet-total span:first-child { color: #666; font-size: 13px; font-weight: 700; letter-spacing: 2px; }
  .sheet-total span:last-child { font-size: 36px; font-weight: 900; color: #3b9eff; }

  /* Options Dialogue Popup Card */
  #opt-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 99; display: none; align-items: center; justify-content: center; padding: 20px; }
  #opt-overlay.show { display: flex; }
  #opt-box { background: #1e1e1e; border-radius: 10px; padding: 20px; width: 100%; max-width: 320px; border: 1px solid #2e2e2e; }
  #opt-title { font-weight: 800; font-size: 15px; margin-bottom: 2px; }
  #opt-price { color: #3b9eff; font-weight: 700; font-size: 20px; margin-bottom: 16px; }
  .opt-group { margin-bottom: 14px; }
  .opt-label { font-size: 11px; color: #666; letter-spacing: 1px; margin-bottom: 8px; }
  .opt-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .opt-btn { flex: 1; min-width: 70px; padding: 10px 4px; border-radius: 6px; border: none; cursor: pointer; font-weight: 700; font-size: 12px; background: #333; color: #fff; line-height: 1.4; }
  .opt-btn.selected { background: #3b9eff; }
  .opt-actions { display: flex; gap: 8px; margin-top: 18px; }
  #opt-cancel { flex: 1; padding: 11px 0; background: #333; color: #f0f0f0; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; }
  #opt-add { flex: 2; padding: 11px 0; background: #3b9eff; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: 800; font-size: 15px; }
</style>
</head>
<body>

<div class="menu-toggle-container">
  <button class="menu-toggle-btn active" id="menu-toggle-morning" onclick="switchMainMenu('morning')">MORNING MENU</button>
  <button class="menu-toggle-btn" id="menu-toggle-lunch" onclick="switchMainMenu('lunch')">LUNCH MENU</button>
</div>

<div class="tabs-container" id="sub-tabs-bar"></div>

<div class="scroll-container" id="menu-scroll-view"></div>

<button id="order-btn" onclick="openOrder()">
  <span id="order-btn-label">VIEW ORDER</span>
  <span id="order-btn-total"></span>
</button>

<div class="overlay" id="order-overlay">
  <div class="sheet">
    <div class="sheet-head">
      <span>ORDER</span>
      <div class="sheet-btns">
        <button class="btn-clear" onclick="clearAll()">CLEAR</button>
        <button class="btn-close" onclick="closeOrder()">CLOSE</button>
      </div>
    </div>
    <div class="sheet-body" id="order-body"></div>
    <div class="sheet-total" id="order-total-bar" style="display:none">
      <span>TOTAL</span>
      <span id="order-total-amt"></span>
    </div>
  </div>
</div>

<div id="opt-overlay">
  <div id="opt-box">
    <div id="opt-title"></div>
    <div id="opt-price"></div>
    <div id="opt-groups"></div>
    <div class="opt-actions">
      <button id="opt-cancel" onclick="closeModal()">Cancel</button>
      <button id="opt-add" onclick="confirmAdd()">Add</button>
    </div>
  </div>
</div>

<script>
// Unified Database Architecture For All Menu Sets
const DATASETS = {
  morning: {
    tabs: ["breakfast", "beverages"],
    tabLabels: { breakfast: "BREAKFAST", beverages: "HOT DRINKS" },
    breakfast: {
      sections: [
        { label: "Morning Breakfast", items: [
          { name: "Fruited Tea Cake", price: 2.45 },
          { name: "Crumpets", price: 2.45 },
          { name: "Bacon Sandwich", price: 6.30 },
          { name: "Croissant & Butter", price: 3.60 },
          { name: "Toast & Butter", price: 2.45 },
          { name: "Preserves Extra", price: 1.10 }
        ]}
      ]
    },
    beverages: {
      sections: [
        { label: "Lavazza Coffee", items: [
          { name: "Americano", price: 3.60, askMilk: true }, 
          { name: "Cafe Latte", price: 3.80, askMilk: true },
          { name: "Macchiato", price: 3.80, askMilk: true }, 
          { name: "Cappuccino", price: 3.80, askMilk: true },
          { name: "Flat White", price: 3.80, askMilk: true }, 
          { name: "Mocha", price: 4.15, askMilk: true },
          { name: "Espresso", price: 2.50 }, 
          { name: "Instant Decaf Coffee", price: 2.40, askMilk: true },
          { name: "Extra Shot of Coffee", price: 1.25 },
          { name: "Flavoured Coffee Syrup", price: 1.00 }
        ]},
        { label: "Teas & Others", items: [
          { name: "Regular Tea - Mug", price: 2.95 }, 
          { name: "Regular Tea - Pot (for 1)", price: 4.00 },
          { name: "Earl Grey - Mug", price: 3.00 }, 
          { name: "Earl Grey - Pot (for 1)", price: 4.10 },
          { name: "Fruit Teas - Mug", price: 3.00 }, 
          { name: "Fruit Teas - Pot (for 1)", price: 4.10 },
          { name: "Hot Chocolate", price: 3.95 }, 
          { name: "Hot Choc with Cream & Marsh", price: 4.20 },
          { name: "Bovril", price: 3.20 }
        ]}
      ]
    }
  },
  lunch: {
    tabs: ["food", "drinks"],
    tabLabels: { food: "FOOD", drinks: "DRINKS" },
    food: {
      sections: [
        { label: "Soups & Salads", items: [
          { name: "Soup of the Day", price: 9.50 },
          { name: "Crab Soup", price: 10.75 },
          { name: "Crab Salad", prices: { Small: 21.95, Large: 28.95 }, askSize: true },
          { name: "Caesar Salad", prices: { Small: 14.95, Large: 21.95 }, askSize: true },
          { name: "Cheddar Salad", prices: { Small: 14.95, Large: 20.25 }, askSize: true },
          { name: "Prawn Cocktail", prices: { Small: 21.75, Large: 26.45 }, askSize: true },
          { name: "Shell Prawns", prices: { Small: 17.95, Large: 24.95 }, askSize: true },
          { name: "Side Salad", price: 7.75 }
        ]},
        { label: "Sandwiches", items: [
          { name: "Crab Sandwich", price: 16.95, askBread: true, askGarnish: true },
          { name: "Smoked Salmon", price: 11.75, askBread: true },
          { name: "Prawns", price: 11.75, askBread: true },
          { name: "Tuna Mayo", price: 9.95, askBread: true },
          { name: "Egg Mayo", price: 8.95, askBread: true },
          { name: "Chicken", price: 9.95, askBread: true },
          { name: "Ham", price: 9.95, askBread: true },
          { name: "Cheddar Cheese", price: 8.45, askBread: true },
          { name: "Salad Sandwich", price: 8.45, askBread: true }
        ]},
        { label: "Handmade Goodies & Snacks", items: [
          { name: "Carrot Cake", price: 4.10 }, 
          { name: "Caramel Shortcake", price: 3.65 },
          { name: "Rock Cake", price: 2.95 }, 
          { name: "Chocolate Brownie", price: 3.65 },
          { name: "Traditional Bread Pudding", price: 2.95 }, 
          { name: "Salted Caramel & Nut Slice", price: 3.65 },
          { name: "Apricot Flapjack (GF)", price: 2.95 }, 
          { name: "Lemon Drizzle Cake (GF)", price: 3.25 },
          { name: "Cream Tea", price: 7.95 }, 
          { name: "Crisps", price: 1.80 }
        ]}
      ]
    },
    drinks: {
      sections: [
        { label: "Cold Drinks", items: [
          { name: "OJ / Apple Juice", price: 1.70 }, { name: "Ribena", price: 1.90 },
          { name: "Soft Drink Can", price: 3.00 }, { name: "Elderflower Presse", price: 3.75 },
          { name: "Raspberry Lemonade", price: 3.75 }, { name: "Mineral Water", price: 1.90 }
        ]},
        { label: "Alcohol", items: [
          { name: "Carling", price: 5.00 }, { name: "Estrella", price: 5.25 },
          { name: "Planet Lager", price: 6.50 }, { name: "Wight Gold Ale", price: 6.50 },
          { name: "Fuggle Dee Dum", price: 6.50 }, { name: "Cider", price: 6.50 }
        ]}
      ]
    }
  }
};

const BREAD = [
  { label: "White", surcharge: 0 },
  { label: "Brown Seeded", surcharge: 0 },
  { label: "Baguette", surcharge: 1.80 }
];
const GARNISH = ["Crisps", "Salad Garnish"];
const SIZES = ["Small", "Large"];
const MILKS = [
  { label: "Semi-Skimmed", surcharge: 0 },
  { label: "Soya Milk", surcharge: 0.40 },
  { label: "Oat Milk", surcharge: 0.40 }
];

// Tracking variables for UI state engine
let activeMainMenu = "morning";
let activeSubTab = "breakfast";
let openSections = {};
let lines = [];
let modalItem = null;
let modalOpts = {};

// Changes layout state between Morning and Lunch
function switchMainMenu(menuKey) {
  activeMainMenu = menuKey;
  activeSubTab = DATASETS[menuKey].tabs[0];
  
  document.getElementById("menu-toggle-morning").classList.toggle("active", menuKey === "morning");
  document.getElementById("menu-toggle-lunch").classList.toggle("active", menuKey === "lunch");
  
  renderSubTabsBar();
  switchSubTab(activeSubTab);
}

// Renders category tab switches dynamically
function renderSubTabsBar() {
  const container = document.getElementById("sub-tabs-bar");
  container.innerHTML = "";
  const dataset = DATASETS[activeMainMenu];
  
  dataset.tabs.forEach(tabKey => {
    const btn = document.createElement("button");
    btn.className = "tab-btn";
    btn.id = "tab-btn-" + tabKey;
    btn.textContent = dataset.tabLabels[tabKey];
    btn.onclick = () => switchSubTab(tabKey);
    container.appendChild(btn);
  });
}

// Updates state and draws content layout view updates
function switchSubTab(tabKey) {
  activeSubTab = tabKey;
  const dataset = DATASETS[activeMainMenu];
  
  dataset.tabs.forEach(tKey => {
    const btn = document.getElementById("tab-btn-" + tKey);
    if (btn) btn.classList.toggle("active", tKey === tabKey);
  });
  
  renderMenuGrid();
}

// Generates structural accordion interfaces and grids
function renderMenuGrid() {
  const container = document.getElementById("menu-scroll-view");
  container.innerHTML = "";
  
  const currentCategoryData = DATASETS[activeMainMenu][activeSubTab];
  if (!currentCategoryData) return;

  currentCategoryData.sections.forEach(section => {
    const sectionId = activeMainMenu + "_" + activeSubTab + "_" + section.label;
    // Default accordions to true (open) if undefined
    if (openSections[sectionId] === undefined) {
      openSections[sectionId] = true;
    }
    const isSectionOpen = openSections[sectionId];
    
    const accBtn = document.createElement("button");
    accBtn.className = "acc-btn" + (isSectionOpen ? " open" : "");
    accBtn.innerHTML = "<span>" + section.label.toUpperCase() + "</span><span>" + (isSectionOpen ? "▲" : "▼") + "</span>";
    accBtn.onclick = () => {
      openSections[sectionId] = !isSectionOpen;
      renderMenuGrid();
    };
    container.appendChild(accBtn);

    if (isSectionOpen) {
      const grid = document.createElement("div");
      grid.className = "acc-grid";
      section.items.forEach(item => {
        const btn = document.createElement("button");
        btn.className = "item-btn";
        const priceStr = item.askSize
          ? "£" + item.prices.Small.toFixed(2) + "–£" + item.prices.Large.toFixed(2)
          : "£" + item.price.toFixed(2);
        btn.innerHTML = "<span class='item-name'>" + item.name + "</span><span class='item-price'>" + priceStr + "</span>";
        btn.onclick = () => tapItem(item);
        grid.appendChild(btn);
      });
      container.appendChild(grid);
    }
  });
}

function lineKey(name, opts) {
  return name + (opts ? JSON.stringify(opts) : "");
}

function lineLabel(name, opts) {
  if (!opts) return name;
  const parts = [opts.size, opts.bread, opts.garnish, opts.milk].filter(Boolean);
  return parts.length ? name + " (" + parts.join(", ") + ")" : name;
}

function calcPrice(item, opts) {
  const base = item.askSize ? item.prices[(opts && opts.size) || "Small"] : item.price;
  const bread = opts && opts.bread ? BREAD.find(b => b.label === opts.bread) : null;
  const milk = opts && opts.milk ? MILKS.find(m => m.label === opts.milk) : null;
  return base + (bread ? bread.surcharge : 0) + (milk ? milk.surcharge : 0);
}

function tapItem(item) {
  if (item.askSize || item.askBread || item.askGarnish || item.askMilk) {
    modalItem = item;
    modalOpts = {
      size: item.askSize ? SIZES[0] : null,
      bread: item.askBread ? BREAD[0].label : null,
      garnish: item.askGarnish ? GARNISH[0] : null,
      milk: item.askMilk ? MILKS[0].label : null
    };
    renderModal();
    document.getElementById("opt-overlay").classList.add("show");
  } else {
    addLine(item, null);
  }
}

function renderModal() {
  document.getElementById("opt-title").textContent = modalItem.name;
  updateModalPrice();
  const groups = document.getElementById("opt-groups");
  groups.innerHTML = "";

  if (modalItem.askSize) groups.appendChild(makeOptGroup("SIZE", SIZES.map(s => ({ label: s, surcharge: 0 })), modalOpts.size, s => { modalOpts.size = s; renderModal(); }));
  if (modalItem.askBread) groups.appendChild(makeOptGroup("BREAD", BREAD, modalOpts.bread, b => { modalOpts.bread = b; renderModal(); }));
  if (modalItem.askGarnish) groups.appendChild(makeOptGroup("SERVED WITH", GARNISH.map(g => ({ label: g, surcharge: 0 })), modalOpts.garnish, g => { modalOpts.garnish = g; renderModal(); }));
  if (modalItem.askMilk) groups.appendChild(makeOptGroup("MILK OPTION", MILKS, modalOpts.milk, m => { modalOpts.milk = m; renderModal(); }));
}

function makeOptGroup(label, options, selected, onSelect) {
  const div = document.createElement("div");
  div.className = "opt-group";
  div.innerHTML = "<div class='opt-label'>" + label + "</div>";
  const row = document.createElement("div");
  row.className = "opt-row";
  for (const opt of options) {
    const val = typeof opt === "object" ? opt.label : opt;
    const sub = typeof opt === "object" && opt.surcharge > 0 ? " +£" + opt.surcharge.toFixed(2) : "";
    const btn = document.createElement("button");
    btn.className = "opt-btn" + (selected === val ? " selected" : "");
    btn.textContent = val + sub;
    btn.onclick = () => onSelect(val);
    row.appendChild(btn);
  }
  div.appendChild(row);
  return div;
}

function updateModalPrice() {
  const p = calcPrice(modalItem, modalOpts);
  document.getElementById("opt-price").textContent = "£" + p.toFixed(2);
  document.getElementById("opt-add").textContent = "Add £" + p.toFixed(2);
}

function confirmAdd() {
  addLine(modalItem, { size: modalOpts.size, bread: modalOpts.bread, garnish: modalOpts.garnish, milk: modalOpts.milk });
  closeModal();
}

function closeModal() {
  document.getElementById("opt-overlay").classList.remove("show");
}

function addLine(item, opts) {
  const price = calcPrice(item, opts);
  const key = lineKey(item.name, opts);
  const idx = lines.findIndex(l => l.key === key);
  
  // Sorting tags mapping routing to checkout lines
  const isBreakfastItem = DATASETS.morning.breakfast.sections[0].items.some(i => i.name === item.name);
  const isLunchFood = DATASETS.lunch.food.sections.some(s => s.items.some(i => i.name === item.name));
  const categorisedAsFood = isBreakfastItem || isLunchFood;

  if (idx >= 0) {
    lines[idx].qty++;
  } else {
    lines.push({ key, name: item.name, price, qty: 1, opts, food: categorisedAsFood });
  }
  updateOrderBtn();
}

function removeLine(key) {
  lines = lines.filter(l => l.key !== key);
  updateOrderBtn();
  renderOrderSheet();
}

function setLineQty(key, val) {
  const q = parseInt(val);
  if (isNaN(q) || q < 0) return;
  if (q === 0) { removeLine(key); return; }
  const l = lines.find(l => l.key === key);
  if (l) { l.qty = q; updateOrderBtn(); renderOrderSheet(); }
}

function updateOrderBtn() {
  const btn = document.getElement
